{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: { app: maf, component: postgres }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: maf, component: postgres } }
  template:
    metadata:
      labels: { app: maf, component: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          env:
            - {name: POSTGRES_PASSWORD, value: "postgres"}
          ports:
            - {name: tcp, containerPort: 5432}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: {{ .Values.postgres.storage | quote }} }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: maf, component: postgres }
  ports:
    - name: tcp
      port: 5432
      targetPort: tcp
{{- end }}
