{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels: {{- include "maf.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector: { matchLabels: { app: maf, component: nats } }
  template:
    metadata:
      labels: { app: maf, component: nats }
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          args: ["-js"]
          ports:
            - name: client
              containerPort: 4222
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector: { app: maf, component: nats }
  ports:
    - name: client
      port: 4222
      targetPort: client
{{- end }}
