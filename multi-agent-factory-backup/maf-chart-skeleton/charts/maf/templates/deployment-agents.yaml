{{- range .Values.agents.list }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-{{ .name }}
  labels:
    app: maf
    component: agent
    agent: {{ .name }}
spec:
  replicas: {{ $.Values.agents.replicas }}
  selector:
    matchLabels: { app: maf, component: agent, agent: {{ .name }} }
  template:
    metadata:
      labels: { app: maf, component: agent, agent: {{ .name }} }
    spec:
      containers:
        - name: agent
          image: "{{ $.Values.global.registry }}/{{ $.Values.agents.image }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef: {name: maf-router}
            - configMapRef: {name: maf-storage}
            - secretRef: {name: maf-runtime}
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ $.Values.agents.env.OTEL_EXPORTER_OTLP_ENDPOINT }}"
          resources:
{{ toYaml $.Values.agents.resources | indent 12 }}
---
{{- end }}
