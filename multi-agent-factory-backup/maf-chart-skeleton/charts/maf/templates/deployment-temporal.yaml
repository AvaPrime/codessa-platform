{{- if .Values.temporal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  labels: {{- include "maf.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector: { matchLabels: { app: maf, component: temporal } }
  template:
    metadata:
      labels: { app: maf, component: temporal }
    spec:
      containers:
        - name: temporal
          image: {{ .Values.temporal.image | quote }}
          env:
            - name: DB
              value: {{ .Values.temporal.persistence | quote }}
          ports:
            - name: grpc
              containerPort: 7233
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  selector: { app: maf, component: temporal }
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
{{- end }}
