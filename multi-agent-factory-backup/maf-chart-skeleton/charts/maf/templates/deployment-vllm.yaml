{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels: { app: maf, component: vllm }
spec:
  replicas: 1
  selector: { matchLabels: { app: maf, component: vllm } }
  template:
    metadata:
      labels: { app: maf, component: vllm }
    spec:
      containers:
        - name: vllm
          image: {{ .Values.vllm.image | quote }}
          env:
            - name: VLLM_MODEL_NAME
              value: "{{ (index .Values.vllm.models 0).name }}"
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
spec:
  selector: { app: maf, component: vllm }
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- end }}
