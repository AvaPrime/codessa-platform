apiVersion: apps/v1
kind: Deployment
metadata:
  name: maf-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: maf-api
  template:
    metadata:
      labels:
        app: maf-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /livez, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
