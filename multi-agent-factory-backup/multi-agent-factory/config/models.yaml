# Model configuration profiles for different use cases
profiles:
  deep_reasoning:
    provider: openai
    model: gpt-5
    reasoning_effort: high
    max_output_tokens: 8000
    temperature: 0.7
    verbosity: high
    
  structured_code:
    provider: openai
    model: gpt-4o
    temperature: 0.2
    max_output_tokens: 4000
    reasoning_effort: medium
    
  economical:
    provider: openai
    model: gpt-4o-mini
    temperature: 0.3
    max_output_tokens: 2000
    reasoning_effort: low
    
  claude_reasoning:
    provider: anthropic
    model: claude-sonnet-4
    temperature: 0.5
    max_output_tokens: 4000

# Map agent roles to model profiles
role_mappings:
  doc_writer: structured_code
  frontend_dev: deep_reasoning
  backend_dev: deep_reasoning  
  qa_tester: economical
  compliance_checker: structured_code

# Budget-based overrides
budget_overrides:
  economy: economical
  standard: structured_code
  premium: deep_reasoning
