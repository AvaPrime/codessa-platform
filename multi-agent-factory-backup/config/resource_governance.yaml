# Resource Governance Framework Configuration
governance:
  version: "1.0"
  effective_date: "2024-01-01"
  
# Resource Policies
policies:
  compute:
    # CPU limits per service type
    cpu_limits:
      api: "2000m"          # 2 CPU cores
      agents: "1000m"       # 1 CPU core per agent
      orchestrator: "500m"  # 0.5 CPU cores
      worker: "1500m"       # 1.5 CPU cores
    
    # Memory limits per service type
    memory_limits:
      api: "4Gi"
      agents: "2Gi"
      orchestrator: "1Gi"
      worker: "3Gi"
    
    # Resource requests (guaranteed)
    cpu_requests:
      api: "1000m"
      agents: "500m"
      orchestrator: "250m"
      worker: "750m"
    
    memory_requests:
      api: "2Gi"
      agents: "1Gi"
      orchestrator: "512Mi"
      worker: "1.5Gi"
  
  storage:
    # Persistent volume limits
    pv_limits:
      postgres: "100Gi"
      redis: "10Gi"
      nats: "50Gi"
      logs: "20Gi"
    
    # Ephemeral storage limits
    ephemeral_limits:
      api: "5Gi"
      agents: "2Gi"
      orchestrator: "1Gi"
  
  network:
    # Network policies
    ingress_rate_limit: "1000/min"
    egress_rate_limit: "5000/min"
    max_connections: 1000
  
  cost:
    # Budget constraints (monthly)
    total_budget_usd: 5000
    compute_budget_usd: 3000
    storage_budget_usd: 1000
    network_budget_usd: 500
    llm_budget_usd: 500
    
    # Cost allocation by team/project
    allocation:
      development: 40%
      staging: 20%
      production: 40%
    
    # Alert thresholds
    budget_alert_thresholds:
      warning: 75%    # 75% of budget
      critical: 90%   # 90% of budget
      emergency: 95%  # 95% of budget

# Service Level Agreements
sla:
  availability:
    api: 99.9%
    agents: 99.5%
    orchestrator: 99.9%
  
  performance:
    api_latency_p95: "200ms"
    task_processing_time: "30s"
    throughput: "1000 tasks/min"
  
  resource_utilization:
    cpu_target: 70%
    memory_target: 80%
    storage_target: 85%

# Quota Management
quotas:
  per_tenant:
    max_tasks_per_hour: 1000
    max_concurrent_tasks: 50
    max_storage_gb: 10
    max_api_calls_per_minute: 100
  
  per_agent_type:
    doc_writer:
      max_instances: 5
      max_memory_per_instance: "2Gi"
      max_cpu_per_instance: "1000m"
    
    frontend_dev:
      max_instances: 3
      max_memory_per_instance: "3Gi"
      max_cpu_per_instance: "1500m"
    
    backend_dev:
      max_instances: 3
      max_memory_per_instance: "3Gi"
      max_cpu_per_instance: "1500m"
    
    qa_tester:
      max_instances: 4
      max_memory_per_instance: "2Gi"
      max_cpu_per_instance: "1000m"
    
    compliance_checker:
      max_instances: 2
      max_memory_per_instance: "1.5Gi"
      max_cpu_per_instance: "750m"

# Monitoring and Alerting
monitoring:
  metrics_retention: "30d"
  alert_channels:
    - slack: "#ops-alerts"
    - email: "ops-team@company.com"
    - pagerduty: "resource-governance"
  
  dashboards:
    - name: "Resource Utilization"
      panels:
        - cpu_usage
        - memory_usage
        - storage_usage
        - network_io
    
    - name: "Cost Tracking"
      panels:
        - daily_spend
        - budget_burn_rate
        - cost_by_service
        - llm_token_costs
    
    - name: "SLA Compliance"
      panels:
        - availability_metrics
        - latency_percentiles
        - error_rates
        - throughput_metrics