---
# Service Account for Agents
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maf-agent
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: multi-agent-factory
automountServiceAccountToken: true

---
# Role for Agent Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maf-agent
  namespace: multi-agent-factory
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# RoleBinding for Agent Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maf-agent
  namespace: multi-agent-factory
subjects:
- kind: ServiceAccount
  name: maf-agent
  namespace: multi-agent-factory
roleRef:
  kind: Role
  name: maf-agent
  apiGroup: rbac.authorization.k8s.io