# Document Writer Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-writer-agent
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: doc-writer-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: multi-agent-factory
    agent.maf.io/type: doc_writer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: doc-writer-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: doc-writer-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: multi-agent-factory
        agent.maf.io/type: doc_writer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: maf-agent
      containers:
      - name: doc-writer
        image: maf-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: metrics
        env:
        - name: AGENT_TYPE
          value: "doc_writer"
        - name: AGENT_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NATS_URL
          value: "nats://$(NATS_AUTH_TOKEN)@nats:4222"
        - name: NATS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: NATS_AUTH_TOKEN
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: OPENAI_API_KEY
        - name: MAX_CONCURRENT_TASKS
          value: "5"
        - name: TASK_TIMEOUT
          value: "1800"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: agent.maf.io/type
                  operator: In
                  values:
                  - doc_writer
              topologyKey: kubernetes.io/hostname

