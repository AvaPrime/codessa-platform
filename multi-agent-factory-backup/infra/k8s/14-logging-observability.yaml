  selector:
    matchLabels:
      app.kubernetes.io/component: logging
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# Observability ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: observability-monitor
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: observability-monitor
    app.kubernetes.io/component: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: observability
  endpoints:
  - port: prometheus
    interval: 30s
    path: /metrics