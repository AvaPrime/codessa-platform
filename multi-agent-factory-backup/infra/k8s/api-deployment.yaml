apiVersion: apps/v1
kind: Deployment
metadata:
  name: maf-api
  namespace: multi-agent-factory
spec:
  replicas: 3
  selector:
    matchLabels:
      app: maf-api
  template:
    metadata:
      labels:
        app: maf-api
    spec:
      containers:
      - name: api
        image: multi-agent-factory:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "production"
        - name: POSTGRES_URI
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: postgres-uri
        - name: REDIS_HOST
          value: "redis-service"
        - name: NATS_URL
          value: "nats://nats-service:4222"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: maf-api-service
  namespace: multi-agent-factory
spec:
  selector:
    app: maf-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
