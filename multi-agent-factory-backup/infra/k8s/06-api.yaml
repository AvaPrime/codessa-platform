# Multi-Agent Factory API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maf-api
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: multi-agent-factory
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: maf-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: maf-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: multi-agent-factory
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        config.linkerd.io/proxy-cpu-request: "0.2"
        config.linkerd.io/proxy-memory-request: "64Mi"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: maf-api
      containers:
      - name: api
        image: maf-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # Database Configuration
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_DB
        
        # Redis Configuration
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: REDIS_PASSWORD
        
        # NATS Configuration
        - name: NATS_URL
          value: "nats://$(NATS_AUTH_TOKEN)@nats:4222"
        - name: NATS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: NATS_AUTH_TOKEN
        
        # Security Configuration
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: JWT_SECRET_KEY
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: ENCRYPTION_KEY
        
        # LLM API Keys
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: ANTHROPIC_API_KEY
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: GOOGLE_API_KEY
        
        # Application Configuration
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: WORKERS
          value: "4"
        - name: MAX_CONCURRENT_TASKS
          value: "100"
        - name: TASK_TIMEOUT
          value: "3600"
        
        # Kubernetes-specific
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        
        # Observability
        - name: JAEGER_AGENT_HOST
          value: "jaeger-agent"
        - name: JAEGER_AGENT_PORT
          value: "6831"
        - name: PROMETHEUS_MULTIPROC_DIR
          value: "/tmp/prometheus"
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: prometheus-multiproc
          mountPath: /tmp/prometheus
        - name: app-config
          mountPath: /app/config
          readOnly: true
        - name: tls-certs
          mountPath: /etc/ssl/certs/app
          readOnly: true
        
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
            ephemeral-storage: 2Gi
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 12
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - "sleep 15"
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: prometheus-multiproc
        emptyDir: {}
      - name: app-config
        configMap:
          name: maf-config
      - name: tls-certs
        secret:
          secretName: maf-tls-secret
      
      nodeSelector:
        kubernetes.io/arch: amd64
      
      tolerations:
      - key: "api"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                - m5.large
                - m5.xlarge
                - c5.large
                - c5.xlarge
      
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: maf-api
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: multi-agent-factory
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: maf-api
    app.kubernetes.io/component: api
  sessionAffinity: None

---
# Service Account for API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: maf-api
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: multi-agent-factory
automountServiceAccountToken: true

---
# Role for API Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maf-api
  namespace: multi-agent-factory
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]

---
# RoleBinding for API Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: maf-api
  namespace: multi-agent-factory
subjects:
- kind: ServiceAccount
  name: maf-api
  namespace: multi-agent-factory
roleRef:
  kind: Role
  name: maf-api
  apiGroup: rbac.authorization.k8s.io