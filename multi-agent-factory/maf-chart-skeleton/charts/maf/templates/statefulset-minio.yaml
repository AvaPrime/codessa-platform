{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels: { app: maf, component: minio }
spec:
  serviceName: minio
  replicas: 1
  selector: { matchLabels: { app: maf, component: minio } }
  template:
    metadata:
      labels: { app: maf, component: minio }
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          args: ["server", "/data"]
          env:
            - {name: MINIO_ROOT_USER, value: "{{ .Values.minio.accessKey }}"}
            - {name: MINIO_ROOT_PASSWORD, value: "{{ .Values.minio.secretKey }}"}
          ports:
            - {name: http, containerPort: 9000}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: {{ .Values.minio.storage | quote }} }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector: { app: maf, component: minio }
  ports:
    - name: http
      port: 9000
      targetPort: http
{{- end }}
