openapi: 3.0.3
info:
  title: Multi-Agent Factory API
  description: |
    A model-agnostic, event-driven multi-agent system API that orchestrates AI agents 
    to collaborate on complex tasks. Built for scalability, extensibility, and production deployment.
  version: 1.0.0
  contact:
    name: Multi-Agent Factory Team
    email: team@multi-agent-factory.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: https://api.multi-agent-factory.com
    description: Production server

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API and its dependencies
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                  dependencies:
                    type: object
                    properties:
                      database:
                        type: string
                        example: "connected"
                      redis:
                        type: string
                        example: "connected"
                      nats:
                        type: string
                        example: "connected"

  /tasks:
    post:
      summary: Submit a new task
      description: Submit a task to be processed by the appropriate agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /tasks/{task_id}:
    get:
      summary: Get task status
      description: Retrieve the current status and results of a task
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatus'
        '404':
          description: Task not found

  /agents:
    get:
      summary: List available agents
      description: Get a list of all available agents and their capabilities
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TaskRequest:
      type: object
      required:
        - role
        - payload
      properties:
        role:
          type: string
          enum: [doc_writer, frontend_dev, backend_dev, qa_tester, compliance_checker]
          description: The agent role to handle this task
        payload:
          type: object
          description: Task-specific data
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        timeout_seconds:
          type: integer
          minimum: 30
          maximum: 3600
          default: 300

    TaskResponse:
      type: object
      properties:
        task_id:
          type: string
          description: Unique task identifier
        status:
          type: string
          enum: [queued, processing, completed, failed]
        created_at:
          type: string
          format: date-time
        estimated_completion:
          type: string
          format: date-time

    TaskStatus:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        result:
          type: object
          description: Task result (only present when completed)
        error:
          type: string
          description: Error message (only present when failed)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        role:
          type: string
        name:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        model:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]