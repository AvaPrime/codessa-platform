name: Backlog Management

# Automated backlog validation and reporting workflow
# Runs on backlog changes and scheduled intervals

on:
  push:
    paths:
      - 'PROJECT_BACKLOG.md'
      - 'scripts/backlog_manager.py'
      - '.github/workflows/backlog-management.yml'
  pull_request:
    paths:
      - 'PROJECT_BACKLOG.md'
      - 'scripts/backlog_manager.py'
  schedule:
    # Run weekly backlog report on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Type of report to generate'
        required: true
        default: 'summary'
        type: choice
        options:
          - summary
          - sprint
          - owners
          - metrics
      sprint_name:
        description: 'Sprint name (for sprint reports)'
        required: false
        default: 'current'
        type: string
      output_format:
        description: 'Output format'
        required: true
        default: 'text'
        type: choice
        options:
          - text
          - json

jobs:
  validate-backlog:
    name: Validate Backlog Format
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install minimal dependencies for backlog manager
          pip install dataclasses-json
          
      - name: Validate backlog format
        run: |
          python scripts/backlog_manager.py validate
          
      - name: Generate validation report
        run: |
          echo "## Backlog Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python scripts/backlog_manager.py validate 2>&1 | tee validation_output.txt
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat validation_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
      - name: Check for critical issues
        run: |
          # Fail the job if critical validation issues are found
          if grep -q "❌" validation_output.txt; then
            echo "Critical validation issues found!"
            exit 1
          fi

  generate-reports:
    name: Generate Backlog Reports
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dataclasses-json
          
      - name: Generate summary report
        if: github.event.inputs.report_type == 'summary' || github.event_name == 'schedule'
        run: |
          echo "## Backlog Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          python scripts/backlog_manager.py report >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Save report as artifact
          python scripts/backlog_manager.py report > backlog_summary_report.txt
          python scripts/backlog_manager.py report --format json > backlog_summary_report.json
          
      - name: Generate sprint report
        if: github.event.inputs.report_type == 'sprint'
        run: |
          SPRINT_NAME="${{ github.event.inputs.sprint_name || 'current' }}"
          FORMAT="${{ github.event.inputs.output_format || 'text' }}"
          
          echo "## Sprint Report: $SPRINT_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          python scripts/backlog_manager.py sprint-report "$SPRINT_NAME" --format text >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Save report as artifact
          python scripts/backlog_manager.py sprint-report "$SPRINT_NAME" --format "$FORMAT" > "sprint_report_${SPRINT_NAME}.${FORMAT}"
          
      - name: Generate owner workload report
        if: github.event.inputs.report_type == 'owners'
        run: |
          FORMAT="${{ github.event.inputs.output_format || 'text' }}"
          
          echo "## Owner Workload Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          python scripts/backlog_manager.py owner-report --format text >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Save report as artifact
          python scripts/backlog_manager.py owner-report --format "$FORMAT" > "owner_workload_report.${FORMAT}"
          
      - name: Generate metrics report
        if: github.event.inputs.report_type == 'metrics' || github.event_name == 'schedule'
        run: |
          echo "## Backlog Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          python scripts/backlog_manager.py metrics >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # Save metrics as artifact
          python scripts/backlog_manager.py metrics > backlog_metrics.json
          
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backlog-reports-${{ github.run_number }}
          path: |
            *.txt
            *.json
          retention-days: 30

  check-overdue-items:
    name: Check for Overdue Items
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dataclasses-json
          
      - name: Check for overdue items
        run: |
          # Generate report and check for overdue items
          python scripts/backlog_manager.py report --format json > report.json
          
          # Extract overdue items count
          OVERDUE_COUNT=$(python -c "import json; data=json.load(open('report.json')); print(len(data.get('overdue_items', [])))")
          
          echo "Found $OVERDUE_COUNT overdue items"
          
          if [ "$OVERDUE_COUNT" -gt "0" ]; then
            echo "## ⚠️ Overdue Backlog Items Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found **$OVERDUE_COUNT** overdue items that need attention:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract and display overdue items
            python -c "
            import json
            data = json.load(open('report.json'))
            for item in data.get('overdue_items', []):
                print(f\"- **{item['id']}**: {item['title']} (Due: {item['due_date']})\")" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review and update these items or adjust their due dates." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Overdue Items" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All backlog items are on track!" >> $GITHUB_STEP_SUMMARY
          fi

  update-readme:
    name: Update README with Backlog Stats
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dataclasses-json
          
      - name: Generate backlog stats
        run: |
          python scripts/backlog_manager.py metrics > backlog_stats.json
          
      - name: Update README with stats
        run: |
          # Extract key metrics
          TOTAL_ITEMS=$(python -c "import json; data=json.load(open('backlog_stats.json')); print(data['total_items'])")
          TOTAL_EFFORT=$(python -c "import json; data=json.load(open('backlog_stats.json')); print(data['total_effort_points'])")
          CRITICAL_ITEMS=$(python -c "import json; data=json.load(open('backlog_stats.json')); print(data['priority_breakdown']['CRIT'])")
          SPRINT_READY=$(python -c "import json; data=json.load(open('backlog_stats.json')); print(data['sprint_ready_items'])")
          
          # Create or update backlog stats section in README
          if grep -q "<!-- BACKLOG_STATS_START -->" README.md; then
            # Update existing section
            cat > backlog_stats_section.md << EOF
          <!-- BACKLOG_STATS_START -->
          ## 📊 Project Backlog Status
          
          - **Total Items**: $TOTAL_ITEMS
          - **Total Effort**: $TOTAL_EFFORT points
          - **Critical Items**: $CRITICAL_ITEMS
          - **Sprint Ready**: $SPRINT_READY
          
          *Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          
          [View Full Backlog](PROJECT_BACKLOG.md) | [Backlog Reports](https://github.com/$GITHUB_REPOSITORY/actions/workflows/backlog-management.yml)
          <!-- BACKLOG_STATS_END -->
          EOF
            
            # Replace the section in README
            sed -i '/<!-- BACKLOG_STATS_START -->/,/<!-- BACKLOG_STATS_END -->/d' README.md
            cat backlog_stats_section.md >> README.md
          else
            # Add new section at the end
            cat >> README.md << EOF
          
          <!-- BACKLOG_STATS_START -->
          ## 📊 Project Backlog Status
          
          - **Total Items**: $TOTAL_ITEMS
          - **Total Effort**: $TOTAL_EFFORT points
          - **Critical Items**: $CRITICAL_ITEMS
          - **Sprint Ready**: $SPRINT_READY
          
          *Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          
          [View Full Backlog](PROJECT_BACKLOG.md) | [Backlog Reports](https://github.com/$GITHUB_REPOSITORY/actions/workflows/backlog-management.yml)
          <!-- BACKLOG_STATS_END -->
          EOF
          fi
          
      - name: Commit README updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet README.md; then
            echo "No changes to README.md"
          else
            git add README.md
            git commit -m "docs: update backlog statistics in README [skip ci]"
            git push
          fi