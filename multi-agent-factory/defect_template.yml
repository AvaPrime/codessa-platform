name: Bug Report
description: Report a bug in Multi-Agent Factory
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, deployment method
    validations:
      required: true