---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vector-store-pvc
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: multi-agent-factory
    app.kubernetes.io/component: vector-store
spec:
