---
# Pod Disruption Budget for API
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: maf-api-pdb
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-api-pdb
    app.kubernetes.io/component: availability
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: maf-api
      app.kubernetes.io/component: api

---
