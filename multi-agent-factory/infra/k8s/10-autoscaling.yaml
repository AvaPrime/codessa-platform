---
# Custom Resource for Cluster Autoscaler Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-autoscaler-config
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cluster-autoscaler
    app.kubernetes.io/component: autoscaler
data:
  nodes.max: "100"
  nodes.min: "3"
  scale-down-enabled: "true"
  scale-down-delay-after-add: "10m"
  scale-down-unneeded-time: "10m"
  scale-down-utilization-threshold: "0.5"
  skip-nodes-with-local-storage: "false"
  skip-nodes-with-system-pods: "false"
  max-node-provision-time: "15m"
  scan-interval: "10s"
  max-nodes-total: "100"
  cores-total: "0:320"
  memory-total: "0:1280GiB"
  node-group-auto-discovery: "asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/maf-cluster"

---
# Priority Classes for Workload Scheduling
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: maf-critical
  labels:
    app.kubernetes.io/name: maf-critical
    app.kubernetes.io/component: scheduling
value: 1000
globalDefault: false
description: "Critical MAF components like API and database"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: maf-high
  labels:
    app.kubernetes.io/name: maf-high
    app.kubernetes.io/component: scheduling
value: 800
globalDefault: false
description: "High priority MAF agents"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: maf-normal
  labels:
    app.kubernetes.io/name: maf-normal
    app.kubernetes.io/component: scheduling
value: 500
globalDefault: true
description: "Normal priority MAF workloads"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: maf-low
  labels:
    app.kubernetes.io/name: maf-low
    app.kubernetes.io/component: scheduling
value: 200
globalDefault: false
description: "Low priority MAF workloads like monitoring"

---
# Resource Quota for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: maf-resource-quota
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-resource-quota
    app.kubernetes.io/component: governance
spec:
  hard:
    # Compute Resources
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    
    # Storage Resources
    requests.storage: 500Gi
    persistentvolumeclaims: "20"
    
    # Object Counts
    pods: "100"
    services: "20"
    secrets: "20"
    configmaps: "20"
    replicationcontrollers: "0"
    
    # Load Balancers
    services.loadbalancers: "5"
    services.nodeports: "10"

---
# Limit Range for resource constraints
apiVersion: v1
kind: LimitRange
metadata:
  name: maf-limit-range
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: maf-limit-range
    app.kubernetes.io/component: governance
spec:
  limits:
  # Container limits
  - type: Container
    default:
      cpu: 1000m
      memory: 2Gi
      ephemeral-storage: 2Gi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 500Mi
    max:
      cpu: 8000m
      memory: 16Gi
      ephemeral-storage: 10Gi
    min:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 100Mi
  
  # Pod limits
  - type: Pod
    max:
      cpu: 16000m
      memory: 32Gi
      ephemeral-storage: 20Gi
    min:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 500Mi
  
  # PVC limits
  - type: PersistentVolumeClaim
    max:
      storage: 100Gi
    min:
      storage: 1Gi