# PostgreSQL Database Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: multi-agent-factory
spec:
  replicas: 1
  strategy:
    type: Recreate # Ensure only one instance for data consistency
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: multi-agent-factory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
            ephemeral-storage: 2Gi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      # PostgreSQL Exporter for monitoring
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@localhost:5432/$(POSTGRES_DB)?sslmode=disable"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: maf-secrets
              key: POSTGRES_DB
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-config
        configMap:
          name: postgres-config
      - name: postgres-init
        configMap:
          name: postgres-init
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
      - key: "database"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - database
              topologyKey: kubernetes.io/hostname

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: multi-agent-factory
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database

---
# PostgreSQL Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  postgresql.conf: |
    # Connection settings
    listen_addresses = '*'
    port = 5432
    max_connections = 200
    
    # Memory settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # WAL settings
    wal_level = replica
    max_wal_size = 1GB
    min_wal_size = 80MB
    checkpoint_completion_target = 0.9
    
    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_statement = 'all'
    log_min_duration_statement = 1000
    
    # Security
    ssl = off
    password_encryption = scram-sha-256

---
# PostgreSQL Initialization Scripts
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  01-init-extensions.sql: |
    -- Enable required extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE EXTENSION IF NOT EXISTS "vector";
    
    -- Create application schema
    CREATE SCHEMA IF NOT EXISTS maf;
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA maf TO maf_user;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA maf TO maf_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA maf TO maf_user;
  
  02-init-tables.sql: |
    -- Create core tables
    CREATE TABLE IF NOT EXISTS maf.tasks (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        task_type VARCHAR(100) NOT NULL,
        status VARCHAR(50) NOT NULL DEFAULT 'pending',
        payload JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        completed_at TIMESTAMP WITH TIME ZONE,
        assigned_agent VARCHAR(100),
        priority INTEGER DEFAULT 0,
        retry_count INTEGER DEFAULT 0,
        max_retries INTEGER DEFAULT 3
    );
    
    CREATE TABLE IF NOT EXISTS maf.task_results (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        task_id UUID NOT NULL REFERENCES maf.tasks(id) ON DELETE CASCADE,
        result JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        agent_id VARCHAR(100) NOT NULL,
        execution_time_ms INTEGER,
        success BOOLEAN NOT NULL DEFAULT true
    );
    
    CREATE TABLE IF NOT EXISTS maf.agent_metrics (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        agent_id VARCHAR(100) NOT NULL,
        metric_name VARCHAR(100) NOT NULL,
        metric_value NUMERIC NOT NULL,
        timestamp TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        labels JSONB
    );
    
    -- Create indexes
    CREATE INDEX IF NOT EXISTS idx_tasks_status ON maf.tasks(status);
    CREATE INDEX IF NOT EXISTS idx_tasks_created_at ON maf.tasks(created_at);
    CREATE INDEX IF NOT EXISTS idx_tasks_assigned_agent ON maf.tasks(assigned_agent);
    CREATE INDEX IF NOT EXISTS idx_task_results_task_id ON maf.task_results(task_id);
    CREATE INDEX IF NOT EXISTS idx_agent_metrics_agent_id ON maf.agent_metrics(agent_id);
    CREATE INDEX IF NOT EXISTS idx_agent_metrics_timestamp ON maf.agent_metrics(timestamp);
  
  03-init-user-tables.sql: |
    -- User management tables for Multi-Agent Factory
    -- Create users table
    CREATE TABLE IF NOT EXISTS maf.users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        full_name VARCHAR(255),
        hashed_password VARCHAR(255) NOT NULL,
        is_active BOOLEAN DEFAULT true,
        is_verified BOOLEAN DEFAULT false,
        mfa_enabled BOOLEAN DEFAULT false,
        mfa_secret VARCHAR(255),
        failed_login_attempts INTEGER DEFAULT 0,
        locked_until TIMESTAMP,
        last_login TIMESTAMP,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create roles table
    CREATE TABLE IF NOT EXISTS maf.roles (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name VARCHAR(50) UNIQUE NOT NULL,
        description TEXT,
        permissions JSONB,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create user_roles junction table
    CREATE TABLE IF NOT EXISTS maf.user_roles (
        user_id UUID REFERENCES maf.users(id) ON DELETE CASCADE,
        role_id UUID REFERENCES maf.roles(id) ON DELETE CASCADE,
        assigned_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (user_id, role_id)
    );
    
    -- Create user_sessions table for session management
    CREATE TABLE IF NOT EXISTS maf.user_sessions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID REFERENCES maf.users(id) ON DELETE CASCADE,
        jti VARCHAR(255) UNIQUE NOT NULL,
        ip_address INET,
        user_agent TEXT,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        expires_at TIMESTAMP NOT NULL
    );
    
    -- Create indexes for performance
    CREATE INDEX IF NOT EXISTS idx_users_username ON maf.users(username);
    CREATE INDEX IF NOT EXISTS idx_users_email ON maf.users(email);
    CREATE INDEX IF NOT EXISTS idx_users_active ON maf.users(is_active);
    CREATE INDEX IF NOT EXISTS idx_roles_name ON maf.roles(name);
    CREATE INDEX IF NOT EXISTS idx_user_sessions_user_id ON maf.user_sessions(user_id);
    CREATE INDEX IF NOT EXISTS idx_user_sessions_jti ON maf.user_sessions(jti);
    
    -- Insert default roles
    INSERT INTO maf.roles (name, description, permissions) VALUES
    ('admin', 'System Administrator', '["admin:read", "admin:write", "admin:delete", "agents:read", "agents:write", "agents:delete", "tasks:read", "tasks:write", "tasks:delete", "users:read", "users:write", "users:delete", "system:read", "system:write"]'),
    ('operator', 'System Operator', '["agents:read", "agents:write", "tasks:read", "tasks:write", "system:read"]'),
    ('agent-doc-writer', 'Documentation Agent', '["tasks:read", "tasks:write"]'),
    ('agent-backend-dev', 'Backend Development Agent', '["tasks:read", "tasks:write"]'),
    ('agent-frontend-dev', 'Frontend Development Agent', '["tasks:read", "tasks:write"]'),
    ('agent-qa-tester', 'QA Testing Agent', '["tasks:read", "tasks:write"]'),
    ('viewer', 'Read-only User', '["tasks:read", "system:read"]')
    ON CONFLICT (name) DO NOTHING;
    
    -- Insert default admin user (password: admin123)
    INSERT INTO maf.users (username, email, full_name, hashed_password, is_active, is_verified) VALUES
    ('admin', 'admin@multi-agent-factory.com', 'System Administrator', '$argon2id$v=19$m=65536,t=3,p=1$c2FsdA$8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8K8', true, true)
    ON CONFLICT (username) DO NOTHING;
    
    -- Assign admin role to admin user
    INSERT INTO maf.user_roles (user_id, role_id)
    SELECT u.id, r.id
    FROM maf.users u, maf.roles r
    WHERE u.username = 'admin' AND r.name = 'admin'
    ON CONFLICT (user_id, role_id) DO NOTHING;