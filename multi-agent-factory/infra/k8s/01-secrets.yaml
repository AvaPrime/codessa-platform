apiVersion: v1
kind: Secret
metadata:
  name: maf-secrets
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: multi-agent-factory
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "maf_user"
  POSTGRES_PASSWORD: "changeme-secure-password"
  POSTGRES_DB: "multi_agent_factory"
  
  # Redis credentials
  REDIS_PASSWORD: "changeme-redis-password"
  
  # JWT and encryption secrets
  JWT_SECRET: "changeme-jwt-secret-key-minimum-32-chars"
  ENCRYPTION_KEY: "changeme-encryption-key-32-chars-long"
  TASK_SIGNING_SECRET: "changeme-task-signing-secret-key"
  
  # NATS credentials
  NATS_HMAC_SECRET: "changeme-nats-hmac-secret"
  
  # LLM API keys (to be set during deployment)
  OPENAI_API_KEY: "sk-your-openai-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-key-here"
  GOOGLE_API_KEY: "your-google-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: maf-tls-secret
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: multi-agent-factory
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # TLS certificate and key (base64 encoded)
  # Generate with: kubectl create secret tls maf-tls-secret --cert=path/to/tls.crt --key=path/to/tls.key
  tls.crt: LS0tLS1CRUdJTi... # placeholder
  tls.key: LS0tLS1CRUdJTi... # placeholder

---
apiVersion: v1
kind: Secret
metadata:
  name: maf-registry-secret
  namespace: multi-agent-factory
  labels:
    app.kubernetes.io/name: multi-agent-factory
    app.kubernetes.io/component: registry
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6e319 # placeholder for registry credentials