repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: check-added-large-files
    - id: check-merge-conflict
    - id: end-of-file-fixer
    - id: trailing-whitespace
    - id: check-yaml

- repo: https://github.com/psf/black
  rev: 24.4.2
  hooks:
    - id: black

- repo: https://github.com/charliermarsh/ruff-pre-commit
  rev: v0.6.9
  hooks:
    - id: ruff

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.12.0
  hooks:
    - id: mypy
      additional_dependencies: ["types-requests", "types-PyYAML"]

- repo: local
  hooks:
    - id: make-lint
      name: make lint
      entry: make lint
      language: system
      pass_filenames: false
      stages: [commit]

    - id: make-typecheck
      name: make typecheck
      entry: make typecheck
      language: system
      pass_filenames: false
      stages: [commit]

    - id: gen-schemas
      name: Generate JSON Schemas
      entry: python scripts/generate_json_schemas.py
      language: system
      pass_filenames: false
      stages: [commit]

    - id: check-schema-drift
      name: Check JSON Schema Drift
      entry: bash -c "git diff --exit-code config/schemas/json || (echo 'Schema drift detected. Commit generated files.' && exit 1)"
      language: system
      pass_filenames: false
      stages: [commit]
