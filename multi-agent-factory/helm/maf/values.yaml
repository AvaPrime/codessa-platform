image:
  repository: yourorg/maf-api
  tag: latest

replicaCount: 2

service:
  type: ClusterIP
  port: 8000

# Resource Management
resources:
  api:
    limits:
      cpu: "2000m"
      memory: "4Gi"
      ephemeral-storage: "5Gi"
    requests:
      cpu: "1000m"
      memory: "2Gi"
      ephemeral-storage: "1Gi"
  
  agents:
    doc_writer:
      limits:
        cpu: "1000m"
        memory: "2Gi"
        ephemeral-storage: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
        ephemeral-storage: "500Mi"
    
    frontend_dev:
      limits:
        cpu: "1500m"
        memory: "3Gi"
        ephemeral-storage: "2Gi"
      requests:
        cpu: "750m"
        memory: "1.5Gi"
        ephemeral-storage: "500Mi"
    
    backend_dev:
      limits:
        cpu: "1500m"
        memory: "3Gi"
        ephemeral-storage: "2Gi"
      requests:
        cpu: "750m"
        memory: "1.5Gi"
        ephemeral-storage: "500Mi"
    
    qa_tester:
      limits:
        cpu: "1000m"
        memory: "2Gi"
        ephemeral-storage: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
        ephemeral-storage: "500Mi"
    
    compliance_checker:
      limits:
        cpu: "750m"
        memory: "1.5Gi"
        ephemeral-storage: "2Gi"
      requests:
        cpu: "375m"
        memory: "768Mi"
        ephemeral-storage: "500Mi"

# Autoscaling Configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  
  # Advanced autoscaling
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network Policies
networkPolicy:
  enabled: true
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: multi-agent-factory
      ports:
      - protocol: TCP
        port: 8000
  egress:
    - to: []
      ports:
      - protocol: TCP
        port: 5432  # PostgreSQL
      - protocol: TCP
        port: 6379  # Redis
      - protocol: TCP
        port: 4222  # NATS

# Resource Quotas
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "10"
    configmaps: "10"

# Limit Ranges
limitRange:
  enabled: true
  limits:
    - default:
        cpu: "1000m"
        memory: "2Gi"
        ephemeral-storage: "2Gi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
        ephemeral-storage: "100Mi"
      type: Container
    - max:
        cpu: "4000m"
        memory: "8Gi"
        ephemeral-storage: "10Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
        ephemeral-storage: "50Mi"
      type: Container

# Monitoring and Observability
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
  
  prometheusRule:
    enabled: true
    rules:
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
      
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
      
      - alert: BudgetThresholdExceeded
        expr: cost_usd{cost_type="total"} > 4500
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Monthly budget threshold exceeded"

# Cost Optimization
costOptimization:
  enabled: true
  
  # Vertical Pod Autoscaler
  vpa:
    enabled: true
    updateMode: "Auto"
    
  # Node affinity for cost optimization
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
          - t3.medium
          - t3.large
    - weight: 50
      preference:
        matchExpressions:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
          - spot

# Security Policies
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
    - ALL

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
