version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-postgres}
    ports: ["5432:5432"]
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../
      dockerfile: ./api/Dockerfile
    env_file: ["../.env"]
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
