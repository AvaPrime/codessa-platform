name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --entrypoint sh
          -c "ollama serve & \
              while ! curl -s http://localhost:11434/api/ping; do sleep 1; done \
              ollama pull mistral:7b && ollama pull codellama:13b"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest