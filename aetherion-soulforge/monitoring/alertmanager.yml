global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'aetherion-alerts@yourdomain.com'

route:
  group_by: ['alertname', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
  - match:
      severity: critical
    receiver: critical-alerts
  - match:
      component: budget
    receiver: budget-alerts
  - match:
      component: consciousness
    receiver: consciousness-alerts

receivers:
- name: 'web.hook'
  webhook_configs:
  - url: 'http://127.0.0.1:5001/'

- name: 'critical-alerts'
  webhook_configs:
  - url: 'http://127.0.0.1:5001/critical'
  # Uncomment to send critical alerts via email
  # email_configs:
  # - to: 'admin@yourdomain.com'
  #   subject: '[CRITICAL] Aetherion Alert: {{ .GroupLabels.alertname }}'
  #   body: |
  #     {{ range .Alerts }}
  #     Alert: {{ .Annotations.summary }}
  #     Description: {{ .Annotations.description }}
  #     {{ end }}

- name: 'budget-alerts'
  webhook_configs:
  - url: 'http://127.0.0.1:5001/budget'

- name: 'consciousness-alerts'
  webhook_configs:
  - url: 'http://127.0.0.1:5001/consciousness'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
