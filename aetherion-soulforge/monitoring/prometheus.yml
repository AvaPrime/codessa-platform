global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'aetherion'
    static_configs:
      - targets: ['aetherion:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 10s
    
  - job_name: 'aetherion-health'
    static_configs:
      - targets: ['aetherion:8000']
    metrics_path: '/health'
    scrape_interval: 30s
    
  # Additional scrape configs for infrastructure monitoring
  - job_name: 'node-exporter'
    static_configs:
      - targets: []  # Add if you have node-exporter running
        
  - job_name: 'qdrant'
    static_configs:
      - targets: []  # Qdrant doesn't expose prometheus metrics by default
        
  - job_name: 'ollama'
    static_configs:
      - targets: []  # Ollama doesn't expose prometheus metrics by default
