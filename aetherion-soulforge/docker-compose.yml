version: "3.9" 

services: 
  # ---------- Local LLM runtime ---------- 
  ollama: 
    image: ollama/ollama:latest 
    container_name: ollama 
    ports: 
      - "11434:11434" 
    volumes: 
      - ollama_data:/root/.ollama 
    # Pull all required models at start 
    command: > 
      sh -c "ollama serve & 
             while ! curl -s http://localhost:11434/api/ping; do sleep 2; done 
             ollama pull mistral:7b 
             ollama pull codellama:13b 
             ollama pull deepseek-coder:7b 
             echo 'Models ready'" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------- Vector store ---------- 
  qdrant: 
    image: qdrant/qdrant:latest 
    container_name: qdrant 
    ports: 
      - "6333:6333" 
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes: 
  ollama_data: 
  qdrant_data: