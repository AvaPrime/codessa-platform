---
# Backups role - Comprehensive backup and restore system
# This role sets up automated backups for AI development infrastructure

- name: Install backup dependencies
  package:
    name:
      - rsync
      - tar
      - gzip
      - bzip2
      - xz-utils
      - pigz
      - pv
      - rclone
      - restic
      - duplicity
      - gnupg
      - curl
      - jq
      - sqlite3
      - postgresql-client
      - mysql-client
      - python3-boto3
      - python3-paramiko
    state: present
    
- name: Create backup directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /opt/ai-dev/backups
    - /opt/ai-dev/backups/local
    - /opt/ai-dev/backups/remote
    - /opt/ai-dev/backups/scripts
    - /opt/ai-dev/backups/config
    - /opt/ai-dev/backups/logs
    - /opt/ai-dev/backups/temp
    - /opt/ai-dev/backups/restore
    - /var/backups/ai-dev
    - /var/log/ai-dev/backups
    
- name: Create backup configuration
  copy:
    content: |
      # AI Development Infrastructure Backup Configuration
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      
      # Backup settings
      BACKUP_BASE_DIR="/opt/ai-dev/backups"
      BACKUP_LOCAL_DIR="$BACKUP_BASE_DIR/local"
      BACKUP_REMOTE_DIR="$BACKUP_BASE_DIR/remote"
      BACKUP_TEMP_DIR="$BACKUP_BASE_DIR/temp"
      BACKUP_LOG_DIR="/var/log/ai-dev/backups"
      
      # Retention settings
      BACKUP_RETENTION_DAYS={{ backup_retention_days | default(30) }}
      BACKUP_RETENTION_WEEKS={{ backup_retention_weeks | default(12) }}
      BACKUP_RETENTION_MONTHS={{ backup_retention_months | default(12) }}
      
      # Compression settings
      BACKUP_COMPRESSION="{{ backup_compression | default('gzip') }}"  # gzip, bzip2, xz, pigz
      BACKUP_COMPRESSION_LEVEL={{ backup_compression_level | default(6) }}
      
      # Encryption settings
      BACKUP_ENCRYPT={{ backup_encrypt | default('true') }}
      BACKUP_GPG_KEY="{{ backup_gpg_key | default('') }}"
      BACKUP_PASSPHRASE="{{ backup_passphrase | default('') }}"
      
      # Remote storage settings
      BACKUP_REMOTE_ENABLED={{ backup_remote_enabled | default('false') }}
      BACKUP_REMOTE_TYPE="{{ backup_remote_type | default('s3') }}"  # s3, gcs, azure, sftp, rsync
      BACKUP_REMOTE_BUCKET="{{ backup_remote_bucket | default('ai-dev-backups') }}"
      BACKUP_REMOTE_PATH="{{ backup_remote_path | default('/backups') }}"
      
      # AWS S3 settings
      AWS_ACCESS_KEY_ID="{{ aws_access_key_id | default('') }}"
      AWS_SECRET_ACCESS_KEY="{{ aws_secret_access_key | default('') }}"
      AWS_DEFAULT_REGION="{{ aws_default_region | default('us-east-1') }}"
      
      # Notification settings
      BACKUP_NOTIFY_EMAIL="{{ backup_notify_email | default('') }}"
      BACKUP_NOTIFY_SLACK_WEBHOOK="{{ backup_notify_slack_webhook | default('') }}"
      BACKUP_NOTIFY_ON_SUCCESS={{ backup_notify_on_success | default('false') }}
      BACKUP_NOTIFY_ON_FAILURE={{ backup_notify_on_failure | default('true') }}
      
      # Monitoring settings
      BACKUP_HEALTHCHECK_URL="{{ backup_healthcheck_url | default('') }}"
      BACKUP_PROMETHEUS_PUSHGATEWAY="{{ backup_prometheus_pushgateway | default('') }}"
      
      # Backup sources
      BACKUP_SOURCES=(
          "/opt/ai-dev/ray"
          "/opt/ai-dev/jupyter"
          "/opt/ai-dev/mlflow"
          "/opt/ai-dev/github-runner"
          "/opt/ai-dev/monitoring"
          "/home/{{ ansible_user }}"
          "/home/aidev"
          "/etc/docker"
          "/var/lib/docker/volumes"
          "/etc/prometheus"
          "/etc/grafana"
          "/var/lib/grafana"
          "/etc/tailscale"
      )
      
      # Database backup settings
      BACKUP_DATABASES=(
          "postgresql:ai_dev"
          "mysql:mlflow"
          "sqlite:/opt/ai-dev/jupyter/jupyter.db"
      )
      
      # Exclude patterns
      BACKUP_EXCLUDE_PATTERNS=(
          "*.tmp"
          "*.log"
          "*.cache"
          "__pycache__"
          ".git"
          "node_modules"
          "*.pyc"
          "*.pyo"
          "*.swp"
          "*.swo"
          "*~"
          ".DS_Store"
          "Thumbs.db"
      )
    dest: /opt/ai-dev/backups/config/backup.conf
    mode: '0600'
    
- name: Create main backup script
  copy:
    content: |
      #!/bin/bash
      # AI Development Infrastructure Backup Script
      # Comprehensive backup solution with encryption, compression, and remote storage
      
      set -euo pipefail
      
      # Load configuration
      source /opt/ai-dev/backups/config/backup.conf
      
      # Script variables
      SCRIPT_NAME="$(basename "$0")"
      TIMESTAMP=$(date '+%Y%m%d_%H%M%S')
      DATE=$(date '+%Y-%m-%d')
      LOG_FILE="$BACKUP_LOG_DIR/backup_$TIMESTAMP.log"
      BACKUP_NAME="ai-dev-backup_$TIMESTAMP"
      BACKUP_DIR="$BACKUP_LOCAL_DIR/$DATE"
      
      # Ensure log directory exists
      mkdir -p "$BACKUP_LOG_DIR"
      
      # Logging function
      log() {
          local level="$1"
          shift
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $*" | tee -a "$LOG_FILE"
      }
      
      # Error handling
      error_exit() {
          log "ERROR" "$1"
          send_notification "FAILURE" "Backup failed: $1"
          exit 1
      }
      
      # Notification function
      send_notification() {
          local status="$1"
          local message="$2"
          
          # Skip success notifications if disabled
          if [ "$status" = "SUCCESS" ] && [ "$BACKUP_NOTIFY_ON_SUCCESS" != "true" ]; then
              return 0
          fi
          
          # Skip failure notifications if disabled
          if [ "$status" = "FAILURE" ] && [ "$BACKUP_NOTIFY_ON_FAILURE" != "true" ]; then
              return 0
          fi
          
          # Email notification
          if [ -n "$BACKUP_NOTIFY_EMAIL" ]; then
              echo "$message" | mail -s "AI-Dev Backup $status" "$BACKUP_NOTIFY_EMAIL" || true
          fi
          
          # Slack notification
          if [ -n "$BACKUP_NOTIFY_SLACK_WEBHOOK" ]; then
              local color="good"
              [ "$status" = "FAILURE" ] && color="danger"
              
              curl -X POST -H 'Content-type: application/json' \
                  --data "{\"attachments\":[{\"color\":\"$color\",\"title\":\"AI-Dev Backup $status\",\"text\":\"$message\"}]}" \
                  "$BACKUP_NOTIFY_SLACK_WEBHOOK" || true
          fi
          
          # Healthcheck ping
          if [ -n "$BACKUP_HEALTHCHECK_URL" ] && [ "$status" = "SUCCESS" ]; then
              curl -fsS -m 10 --retry 3 "$BACKUP_HEALTHCHECK_URL" || true
          fi
          
          # Prometheus metrics
          if [ -n "$BACKUP_PROMETHEUS_PUSHGATEWAY" ]; then
              local success_value=0
              [ "$status" = "SUCCESS" ] && success_value=1
              
              cat <<EOF | curl --data-binary @- "$BACKUP_PROMETHEUS_PUSHGATEWAY/metrics/job/ai-dev-backup/instance/$(hostname)"
      # HELP ai_dev_backup_success Backup success status
      # TYPE ai_dev_backup_success gauge
      ai_dev_backup_success $success_value
      # HELP ai_dev_backup_timestamp_seconds Backup completion timestamp
      # TYPE ai_dev_backup_timestamp_seconds gauge
      ai_dev_backup_timestamp_seconds $(date +%s)
      EOF
          fi
      }
      
      # Create exclude file
      create_exclude_file() {
          local exclude_file="$BACKUP_TEMP_DIR/exclude.txt"
          
          > "$exclude_file"
          for pattern in "${BACKUP_EXCLUDE_PATTERNS[@]}"; do
              echo "$pattern" >> "$exclude_file"
          done
          
          echo "$exclude_file"
      }
      
      # Backup databases
      backup_databases() {
          log "INFO" "Starting database backups"
          
          local db_backup_dir="$BACKUP_DIR/databases"
          mkdir -p "$db_backup_dir"
          
          for db_spec in "${BACKUP_DATABASES[@]}"; do
              local db_type="${db_spec%%:*}"
              local db_name="${db_spec##*:}"
              
              log "INFO" "Backing up $db_type database: $db_name"
              
              case "$db_type" in
                  postgresql)
                      pg_dump "$db_name" | gzip > "$db_backup_dir/${db_name}_postgresql.sql.gz" || {
                          log "WARN" "Failed to backup PostgreSQL database: $db_name"
                          continue
                      }
                      ;;
                  mysql)
                      mysqldump "$db_name" | gzip > "$db_backup_dir/${db_name}_mysql.sql.gz" || {
                          log "WARN" "Failed to backup MySQL database: $db_name"
                          continue
                      }
                      ;;
                  sqlite)
                      if [ -f "$db_name" ]; then
                          cp "$db_name" "$db_backup_dir/$(basename "$db_name")" || {
                              log "WARN" "Failed to backup SQLite database: $db_name"
                              continue
                          }
                      fi
                      ;;
                  *)
                      log "WARN" "Unknown database type: $db_type"
                      ;;
              esac
          done
          
          log "INFO" "Database backups completed"
      }
      
      # Backup files
      backup_files() {
          log "INFO" "Starting file backups"
          
          local files_backup_dir="$BACKUP_DIR/files"
          mkdir -p "$files_backup_dir"
          
          local exclude_file
          exclude_file=$(create_exclude_file)
          
          for source in "${BACKUP_SOURCES[@]}"; do
              if [ ! -e "$source" ]; then
                  log "WARN" "Source does not exist: $source"
                  continue
              fi
              
              local source_name
              source_name=$(basename "$source")
              local dest="$files_backup_dir/${source_name}.tar.gz"
              
              log "INFO" "Backing up: $source -> $dest"
              
              case "$BACKUP_COMPRESSION" in
                  gzip)
                      tar --exclude-from="$exclude_file" -czf "$dest" -C "$(dirname "$source")" "$(basename "$source")" || {
                          log "WARN" "Failed to backup: $source"
                          continue
                      }
                      ;;
                  bzip2)
                      tar --exclude-from="$exclude_file" -cjf "${dest%.gz}.bz2" -C "$(dirname "$source")" "$(basename "$source")" || {
                          log "WARN" "Failed to backup: $source"
                          continue
                      }
                      ;;
                  xz)
                      tar --exclude-from="$exclude_file" -cJf "${dest%.gz}.xz" -C "$(dirname "$source")" "$(basename "$source")" || {
                          log "WARN" "Failed to backup: $source"
                          continue
                      }
                      ;;
                  pigz)
                      tar --exclude-from="$exclude_file" --use-compress-program=pigz -cf "$dest" -C "$(dirname "$source")" "$(basename "$source")" || {
                          log "WARN" "Failed to backup: $source"
                          continue
                      }
                      ;;
                  *)
                      tar --exclude-from="$exclude_file" -czf "$dest" -C "$(dirname "$source")" "$(basename "$source")" || {
                          log "WARN" "Failed to backup: $source"
                          continue
                      }
                      ;;
              esac
          done
          
          rm -f "$exclude_file"
          log "INFO" "File backups completed"
      }
      
      # Create backup metadata
      create_metadata() {
          log "INFO" "Creating backup metadata"
          
          local metadata_file="$BACKUP_DIR/metadata.json"
          
          cat > "$metadata_file" <<EOF
      {
        "backup_name": "$BACKUP_NAME",
        "timestamp": "$TIMESTAMP",
        "date": "$DATE",
        "hostname": "$(hostname)",
        "system_info": {
          "os": "$(lsb_release -d | cut -f2)",
          "kernel": "$(uname -r)",
          "architecture": "$(uname -m)"
        },
        "backup_config": {
          "compression": "$BACKUP_COMPRESSION",
          "encryption": "$BACKUP_ENCRYPT",
          "remote_enabled": "$BACKUP_REMOTE_ENABLED"
        },
        "sources": $(printf '%s\n' "${BACKUP_SOURCES[@]}" | jq -R . | jq -s .),
        "databases": $(printf '%s\n' "${BACKUP_DATABASES[@]}" | jq -R . | jq -s .),
        "size_bytes": $(du -sb "$BACKUP_DIR" | cut -f1),
        "file_count": $(find "$BACKUP_DIR" -type f | wc -l)
      }
      EOF
          
          log "INFO" "Backup metadata created"
      }
      
      # Encrypt backup
      encrypt_backup() {
          if [ "$BACKUP_ENCRYPT" != "true" ]; then
              return 0
          fi
          
          log "INFO" "Encrypting backup"
          
          local encrypted_file="$BACKUP_LOCAL_DIR/${BACKUP_NAME}.tar.gz.gpg"
          
          # Create archive
          tar -czf - -C "$BACKUP_LOCAL_DIR" "$DATE" | \
              gpg --cipher-algo AES256 --compress-algo 1 --symmetric \
                  --output "$encrypted_file" \
                  ${BACKUP_GPG_KEY:+--recipient "$BACKUP_GPG_KEY"} \
                  ${BACKUP_PASSPHRASE:+--batch --yes --passphrase "$BACKUP_PASSPHRASE"}
          
          # Remove unencrypted backup
          rm -rf "$BACKUP_DIR"
          
          log "INFO" "Backup encrypted: $encrypted_file"
      }
      
      # Upload to remote storage
      upload_remote() {
          if [ "$BACKUP_REMOTE_ENABLED" != "true" ]; then
              return 0
          fi
          
          log "INFO" "Uploading to remote storage ($BACKUP_REMOTE_TYPE)"
          
          local backup_file
          if [ "$BACKUP_ENCRYPT" = "true" ]; then
              backup_file="$BACKUP_LOCAL_DIR/${BACKUP_NAME}.tar.gz.gpg"
          else
              backup_file="$BACKUP_LOCAL_DIR/${DATE}.tar.gz"
              tar -czf "$backup_file" -C "$BACKUP_LOCAL_DIR" "$DATE"
          fi
          
          case "$BACKUP_REMOTE_TYPE" in
              s3)
                  aws s3 cp "$backup_file" "s3://$BACKUP_REMOTE_BUCKET$BACKUP_REMOTE_PATH/$(basename "$backup_file")" || {
                      log "ERROR" "Failed to upload to S3"
                      return 1
                  }
                  ;;
              rclone)
                  rclone copy "$backup_file" "remote:$BACKUP_REMOTE_BUCKET$BACKUP_REMOTE_PATH/" || {
                      log "ERROR" "Failed to upload via rclone"
                      return 1
                  }
                  ;;
              rsync)
                  rsync -avz "$backup_file" "$BACKUP_REMOTE_PATH/" || {
                      log "ERROR" "Failed to upload via rsync"
                      return 1
                  }
                  ;;
              *)
                  log "WARN" "Unknown remote storage type: $BACKUP_REMOTE_TYPE"
                  return 1
                  ;;
          esac
          
          log "INFO" "Remote upload completed"
      }
      
      # Cleanup old backups
      cleanup_old_backups() {
          log "INFO" "Cleaning up old backups"
          
          # Local cleanup
          find "$BACKUP_LOCAL_DIR" -type f -name "*.tar.gz*" -mtime +"$BACKUP_RETENTION_DAYS" -delete || true
          find "$BACKUP_LOCAL_DIR" -type d -empty -delete || true
          
          # Log cleanup
          find "$BACKUP_LOG_DIR" -name "backup_*.log" -mtime +"$BACKUP_RETENTION_DAYS" -delete || true
          
          log "INFO" "Cleanup completed"
      }
      
      # Main backup function
      main() {
          log "INFO" "Starting AI-Dev backup: $BACKUP_NAME"
          
          # Create backup directory
          mkdir -p "$BACKUP_DIR" "$BACKUP_TEMP_DIR"
          
          # Perform backups
          backup_databases
          backup_files
          create_metadata
          
          # Post-processing
          encrypt_backup
          upload_remote
          cleanup_old_backups
          
          # Calculate final size
          local final_size
          if [ "$BACKUP_ENCRYPT" = "true" ]; then
              final_size=$(du -sh "$BACKUP_LOCAL_DIR/${BACKUP_NAME}.tar.gz.gpg" 2>/dev/null | cut -f1 || echo "unknown")
          else
              final_size=$(du -sh "$BACKUP_DIR" 2>/dev/null | cut -f1 || echo "unknown")
          fi
          
          log "INFO" "Backup completed successfully: $BACKUP_NAME (Size: $final_size)"
          send_notification "SUCCESS" "AI-Dev backup completed successfully: $BACKUP_NAME (Size: $final_size)"
          
          # Cleanup temp directory
          rm -rf "$BACKUP_TEMP_DIR"
      }
      
      # Script execution
      if [ "${BASH_SOURCE[0]}" = "${0}" ]; then
          main "$@"
      fi
    dest: /opt/ai-dev/backups/scripts/backup.sh
    mode: '0755'
    
- name: Create restore script
  copy:
    content: |
      #!/bin/bash
      # AI Development Infrastructure Restore Script
      
      set -euo pipefail
      
      # Load configuration
      source /opt/ai-dev/backups/config/backup.conf
      
      # Script variables
      SCRIPT_NAME="$(basename "$0")"
      TIMESTAMP=$(date '+%Y%m%d_%H%M%S')
      LOG_FILE="$BACKUP_LOG_DIR/restore_$TIMESTAMP.log"
      RESTORE_DIR="$BACKUP_BASE_DIR/restore"
      
      # Logging function
      log() {
          local level="$1"
          shift
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $*" | tee -a "$LOG_FILE"
      }
      
      # Error handling
      error_exit() {
          log "ERROR" "$1"
          exit 1
      }
      
      # List available backups
      list_backups() {
          log "INFO" "Available local backups:"
          
          if [ "$BACKUP_ENCRYPT" = "true" ]; then
              find "$BACKUP_LOCAL_DIR" -name "*.tar.gz.gpg" -type f | sort
          else
              find "$BACKUP_LOCAL_DIR" -type d -name "20*" | sort
          fi
      }
      
      # Restore from backup
      restore_backup() {
          local backup_path="$1"
          local target_dir="${2:-/}"
          
          if [ ! -e "$backup_path" ]; then
              error_exit "Backup not found: $backup_path"
          fi
          
          log "INFO" "Starting restore from: $backup_path"
          log "INFO" "Target directory: $target_dir"
          
          # Create restore directory
          mkdir -p "$RESTORE_DIR"
          
          # Extract backup
          if [[ "$backup_path" == *.gpg ]]; then
              log "INFO" "Decrypting backup"
              gpg --decrypt "$backup_path" | tar -xzf - -C "$RESTORE_DIR" || \
                  error_exit "Failed to decrypt and extract backup"
          else
              log "INFO" "Extracting backup"
              if [ -d "$backup_path" ]; then
                  cp -r "$backup_path"/* "$RESTORE_DIR/" || \
                      error_exit "Failed to copy backup"
              else
                  tar -xzf "$backup_path" -C "$RESTORE_DIR" || \
                      error_exit "Failed to extract backup"
              fi
          fi
          
          # Show restore contents
          log "INFO" "Backup contents:"
          ls -la "$RESTORE_DIR"
          
          # Interactive restore confirmation
          if [ "${FORCE_RESTORE:-false}" != "true" ]; then
              echo ""
              echo "WARNING: This will overwrite existing files in $target_dir"
              echo "Backup contents are available in: $RESTORE_DIR"
              echo ""
              read -p "Do you want to proceed with the restore? (yes/no): " -r
              if [[ ! $REPLY =~ ^[Yy][Ee][Ss]$ ]]; then
                  log "INFO" "Restore cancelled by user"
                  exit 0
              fi
          fi
          
          # Perform restore
          log "INFO" "Restoring files to $target_dir"
          
          # Stop services before restore
          log "INFO" "Stopping services"
          systemctl stop github-runner || true
          systemctl stop ray-head || true
          systemctl stop docker || true
          
          # Restore files
          if [ -d "$RESTORE_DIR/files" ]; then
              for archive in "$RESTORE_DIR/files"/*.tar.*; do
                  if [ -f "$archive" ]; then
                      log "INFO" "Restoring: $archive"
                      tar -xf "$archive" -C "$target_dir" || \
                          log "WARN" "Failed to restore: $archive"
                  fi
              done
          fi
          
          # Restore databases
          if [ -d "$RESTORE_DIR/databases" ]; then
              log "INFO" "Restoring databases"
              for db_file in "$RESTORE_DIR/databases"/*; do
                  if [ -f "$db_file" ]; then
                      local filename
                      filename=$(basename "$db_file")
                      
                      if [[ "$filename" == *_postgresql.sql.gz ]]; then
                          local db_name="${filename%_postgresql.sql.gz}"
                          log "INFO" "Restoring PostgreSQL database: $db_name"
                          gunzip -c "$db_file" | psql "$db_name" || \
                              log "WARN" "Failed to restore PostgreSQL database: $db_name"
                      elif [[ "$filename" == *_mysql.sql.gz ]]; then
                          local db_name="${filename%_mysql.sql.gz}"
                          log "INFO" "Restoring MySQL database: $db_name"
                          gunzip -c "$db_file" | mysql "$db_name" || \
                              log "WARN" "Failed to restore MySQL database: $db_name"
                      elif [[ "$filename" == *.db ]]; then
                          log "INFO" "Restoring SQLite database: $filename"
                          # SQLite files are restored with file restore
                      fi
                  fi
              done
          fi
          
          # Fix permissions
          log "INFO" "Fixing permissions"
          chown -R aidev:aidev /home/aidev || true
          chown -R runner:runner /opt/ai-dev/github-runner || true
          
          # Start services
          log "INFO" "Starting services"
          systemctl start docker || true
          systemctl start ray-head || true
          systemctl start github-runner || true
          
          log "INFO" "Restore completed successfully"
      }
      
      # Show usage
      usage() {
          cat <<EOF
      AI Development Infrastructure Restore Script
      
      Usage: $0 [OPTIONS] COMMAND [ARGS]
      
      Commands:
        list                    List available backups
        restore BACKUP_PATH     Restore from backup
        
      Options:
        -f, --force            Force restore without confirmation
        -t, --target DIR       Target directory for restore (default: /)
        -h, --help             Show this help
        
      Examples:
        $0 list
        $0 restore /opt/ai-dev/backups/local/2024-01-15
        $0 -f restore /opt/ai-dev/backups/local/ai-dev-backup_20240115_120000.tar.gz.gpg
      EOF
      }
      
      # Parse command line arguments
      FORCE_RESTORE=false
      TARGET_DIR="/"
      
      while [[ $# -gt 0 ]]; do
          case $1 in
              -f|--force)
                  FORCE_RESTORE=true
                  shift
                  ;;
              -t|--target)
                  TARGET_DIR="$2"
                  shift 2
                  ;;
              -h|--help)
                  usage
                  exit 0
                  ;;
              list)
                  list_backups
                  exit 0
                  ;;
              restore)
                  if [ $# -lt 2 ]; then
                      error_exit "Backup path required for restore command"
                  fi
                  restore_backup "$2" "$TARGET_DIR"
                  exit 0
                  ;;
              *)
                  error_exit "Unknown option: $1"
                  ;;
          esac
      done
      
      usage
      exit 1
    dest: /opt/ai-dev/backups/scripts/restore.sh
    mode: '0755'
    
- name: Create backup utility script
  copy:
    content: |
      #!/bin/bash
      # AI Development Backup Utility Script
      
      set -euo pipefail
      
      # Load configuration
      source /opt/ai-dev/backups/config/backup.conf
      
      # Function to show backup status
      status() {
          echo "=== AI-Dev Backup Status ==="
          echo ""
          
          # Last backup info
          local last_backup
          last_backup=$(find "$BACKUP_LOCAL_DIR" -name "*.tar.gz*" -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2- || echo "")
          
          if [ -n "$last_backup" ]; then
              echo "✓ Last backup: $(basename "$last_backup")"
              echo "  Date: $(stat -c %y "$last_backup" | cut -d. -f1)"
              echo "  Size: $(du -sh "$last_backup" | cut -f1)"
          else
              echo "✗ No backups found"
          fi
          
          echo ""
          
          # Backup schedule
          echo "Backup Schedule:"
          crontab -l | grep -E "backup\.sh|ai-backup" || echo "  No scheduled backups found"
          
          echo ""
          
          # Storage usage
          echo "Storage Usage:"
          echo "  Local: $(du -sh "$BACKUP_LOCAL_DIR" 2>/dev/null | cut -f1 || echo '0')"
          echo "  Logs: $(du -sh "$BACKUP_LOG_DIR" 2>/dev/null | cut -f1 || echo '0')"
          
          echo ""
          
          # Configuration
          echo "Configuration:"
          echo "  Retention: $BACKUP_RETENTION_DAYS days"
          echo "  Compression: $BACKUP_COMPRESSION"
          echo "  Encryption: $BACKUP_ENCRYPT"
          echo "  Remote: $BACKUP_REMOTE_ENABLED"
          
          if [ "$BACKUP_REMOTE_ENABLED" = "true" ]; then
              echo "  Remote Type: $BACKUP_REMOTE_TYPE"
              echo "  Remote Bucket: $BACKUP_REMOTE_BUCKET"
          fi
      }
      
      # Function to list backups
      list() {
          echo "=== Available Backups ==="
          echo ""
          
          if [ "$BACKUP_ENCRYPT" = "true" ]; then
              find "$BACKUP_LOCAL_DIR" -name "*.tar.gz.gpg" -type f -printf '%TY-%Tm-%Td %TH:%TM  %s bytes  %p\n' | sort
          else
              find "$BACKUP_LOCAL_DIR" -type d -name "20*" -printf '%TY-%Tm-%Td %TH:%TM  %p\n' | sort
          fi
      }
      
      # Function to run backup
      backup() {
          echo "Starting AI-Dev backup..."
          /opt/ai-dev/backups/scripts/backup.sh
      }
      
      # Function to restore backup
      restore() {
          /opt/ai-dev/backups/scripts/restore.sh "$@"
      }
      
      # Function to test backup
      test_backup() {
          echo "=== Testing Backup System ==="
          echo ""
          
          # Test configuration
          echo "Testing configuration..."
          if [ -f "/opt/ai-dev/backups/config/backup.conf" ]; then
              echo "✓ Configuration file exists"
          else
              echo "✗ Configuration file missing"
              return 1
          fi
          
          # Test directories
          echo "Testing directories..."
          for dir in "$BACKUP_LOCAL_DIR" "$BACKUP_LOG_DIR" "$BACKUP_TEMP_DIR"; do
              if [ -d "$dir" ]; then
                  echo "✓ Directory exists: $dir"
              else
                  echo "✗ Directory missing: $dir"
                  return 1
              fi
          done
          
          # Test dependencies
          echo "Testing dependencies..."
          local deps=("tar" "gzip" "rsync" "jq")
          if [ "$BACKUP_ENCRYPT" = "true" ]; then
              deps+=("gpg")
          fi
          if [ "$BACKUP_REMOTE_ENABLED" = "true" ]; then
              case "$BACKUP_REMOTE_TYPE" in
                  s3) deps+=("aws") ;;
                  rclone) deps+=("rclone") ;;
              esac
          fi
          
          for dep in "${deps[@]}"; do
              if command -v "$dep" >/dev/null 2>&1; then
                  echo "✓ Dependency available: $dep"
              else
                  echo "✗ Dependency missing: $dep"
                  return 1
              fi
          done
          
          echo ""
          echo "✓ Backup system test passed"
      }
      
      # Function to show logs
      logs() {
          local log_file="${1:-}"
          
          if [ -n "$log_file" ]; then
              if [ -f "$BACKUP_LOG_DIR/$log_file" ]; then
                  tail -f "$BACKUP_LOG_DIR/$log_file"
              else
                  echo "Log file not found: $log_file"
                  return 1
              fi
          else
              echo "=== Recent Backup Logs ==="
              echo ""
              
              local recent_log
              recent_log=$(find "$BACKUP_LOG_DIR" -name "backup_*.log" -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2- || echo "")
              
              if [ -n "$recent_log" ]; then
                  echo "Showing: $(basename "$recent_log")"
                  echo ""
                  tail -50 "$recent_log"
              else
                  echo "No backup logs found"
              fi
          fi
      }
      
      # Function to clean up old backups
      cleanup() {
          echo "Cleaning up old backups..."
          
          # Local cleanup
          local deleted_count=0
          while IFS= read -r -d '' file; do
              echo "Deleting: $(basename "$file")"
              rm -f "$file"
              ((deleted_count++))
          done < <(find "$BACKUP_LOCAL_DIR" -type f -name "*.tar.gz*" -mtime +"$BACKUP_RETENTION_DAYS" -print0 2>/dev/null)
          
          # Log cleanup
          while IFS= read -r -d '' file; do
              rm -f "$file"
              ((deleted_count++))
          done < <(find "$BACKUP_LOG_DIR" -name "backup_*.log" -mtime +"$BACKUP_RETENTION_DAYS" -print0 2>/dev/null)
          
          # Remove empty directories
          find "$BACKUP_LOCAL_DIR" -type d -empty -delete 2>/dev/null || true
          
          echo "Cleanup completed. Deleted $deleted_count files."
      }
      
      # Show usage
      usage() {
          cat <<EOF
      AI Development Backup Utility
      
      Usage: $0 COMMAND [OPTIONS]
      
      Commands:
        status              Show backup status
        list                List available backups
        backup              Run backup now
        restore [OPTIONS]   Restore from backup
        test                Test backup system
        logs [LOG_FILE]     Show backup logs
        cleanup             Clean up old backups
        
      Examples:
        $0 status
        $0 backup
        $0 list
        $0 restore list
        $0 restore /path/to/backup
        $0 logs
        $0 test
        $0 cleanup
      EOF
      }
      
      # Main command dispatcher
      case "${1:-}" in
          status)
              status
              ;;
          list)
              list
              ;;
          backup)
              backup
              ;;
          restore)
              shift
              restore "$@"
              ;;
          test)
              test_backup
              ;;
          logs)
              shift
              logs "$@"
              ;;
          cleanup)
              cleanup
              ;;
          *)
              usage
              exit 1
              ;;
      esac
    dest: /opt/ai-dev/backups/scripts/backup-utils.sh
    mode: '0755'
    
- name: Create backup utility symlink
  file:
    src: /opt/ai-dev/backups/scripts/backup-utils.sh
    dest: /usr/local/bin/ai-backup
    state: link
    
- name: Create backup cron jobs
  cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour }}"
    day: "{{ item.day | default('*') }}"
    month: "{{ item.month | default('*') }}"
    weekday: "{{ item.weekday | default('*') }}"
    job: "{{ item.job }}"
    user: root
  loop:
    - name: "AI-Dev daily backup"
      minute: "0"
      hour: "2"
      job: "/opt/ai-dev/backups/scripts/backup.sh"
    - name: "AI-Dev weekly cleanup"
      minute: "30"
      hour: "3"
      weekday: "0"
      job: "/opt/ai-dev/backups/scripts/backup-utils.sh cleanup"
      
- name: Create backup monitoring script
  copy:
    content: |
      #!/bin/bash
      # Backup monitoring script
      
      LOG_FILE="/var/log/ai-dev/backup-monitor.log"
      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
      
      # Check if backup completed in last 25 hours
      LAST_BACKUP=$(find /opt/ai-dev/backups/local -name "*.tar.gz*" -type f -mtime -1 2>/dev/null | wc -l)
      
      if [ "$LAST_BACKUP" -eq 0 ]; then
          echo "$TIMESTAMP - WARNING: No backup completed in last 24 hours" >> "$LOG_FILE"
          
          # Send alert if configured
          if [ -n "${BACKUP_NOTIFY_EMAIL:-}" ]; then
              echo "No AI-Dev backup completed in last 24 hours" | \
                  mail -s "AI-Dev Backup Alert" "$BACKUP_NOTIFY_EMAIL" || true
          fi
      else
          echo "$TIMESTAMP - INFO: Backup completed recently" >> "$LOG_FILE"
      fi
      
      # Check disk space
      BACKUP_DISK_USAGE=$(df /opt/ai-dev/backups | tail -1 | awk '{print $5}' | sed 's/%//')
      
      if [ "$BACKUP_DISK_USAGE" -gt 90 ]; then
          echo "$TIMESTAMP - WARNING: Backup disk usage is ${BACKUP_DISK_USAGE}%" >> "$LOG_FILE"
      fi
      
      # Clean old monitor logs
      find /var/log/ai-dev -name "backup-monitor.log" -size +10M -exec truncate -s 1M {} \; 2>/dev/null || true
    dest: /opt/ai-dev/scripts/backup-monitor.sh
    mode: '0755'
    
- name: Create backup monitoring cron job
  cron:
    name: "Backup monitoring"
    minute: "15"
    hour: "*/6"
    job: "/opt/ai-dev/scripts/backup-monitor.sh"
    user: root
    
- name: Display backup setup information
  debug:
    msg: |
      Backup system setup completed!
      
      Configuration:
      - Backup Directory: /opt/ai-dev/backups
      - Retention: {{ backup_retention_days | default(30) }} days
      - Compression: {{ backup_compression | default('gzip') }}
      - Encryption: {{ backup_encrypt | default('true') }}
      - Remote Storage: {{ backup_remote_enabled | default('false') }}
      
      Schedule:
      - Daily backup: 02:00 AM
      - Weekly cleanup: Sunday 03:30 AM
      - Monitoring: Every 6 hours
      
      Utility commands:
      - ai-backup status      # Show backup status
      - ai-backup backup      # Run backup now
      - ai-backup list        # List available backups
      - ai-backup restore     # Restore from backup
      - ai-backup test        # Test backup system
      - ai-backup logs        # Show backup logs
      - ai-backup cleanup     # Clean old backups
      
      Configuration file: /opt/ai-dev/backups/config/backup.conf
      
- name: Create completion marker
  file:
    path: /opt/ai-dev/.backups_setup_complete
    state: touch
    mode: '0644'