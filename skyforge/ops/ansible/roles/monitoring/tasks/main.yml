---
# Monitoring role - Prometheus, Grafana, and observability setup
# This role sets up comprehensive monitoring for the AI development infrastructure

- name: Create monitoring directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
  loop:
    - /opt/ai-dev/monitoring
    - /opt/ai-dev/monitoring/prometheus
    - /opt/ai-dev/monitoring/grafana
    - /opt/ai-dev/monitoring/alertmanager
    - /opt/ai-dev/monitoring/node-exporter
    - /opt/ai-dev/monitoring/config
    - /opt/ai-dev/monitoring/data
    - /opt/ai-dev/monitoring/logs
    - /opt/ai-dev/monitoring/dashboards
    - /opt/ai-dev/monitoring/rules
    
- name: Install monitoring dependencies
  package:
    name:
      - curl
      - wget
      - tar
      - gzip
      - systemd
    state: present
    
- name: Create monitoring user
  user:
    name: monitoring
    system: true
    shell: /bin/false
    home: /opt/ai-dev/monitoring
    create_home: false
    
- name: Download and install Prometheus
  block:
    - name: Download Prometheus
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version | default('2.47.0') }}/prometheus-{{ prometheus_version | default('2.47.0') }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus-{{ prometheus_version | default('2.47.0') }}.linux-amd64.tar.gz"
        mode: '0644'
        
    - name: Extract Prometheus
      unarchive:
        src: "/tmp/prometheus-{{ prometheus_version | default('2.47.0') }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: true
        
    - name: Install Prometheus binaries
      copy:
        src: "/tmp/prometheus-{{ prometheus_version | default('2.47.0') }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        remote_src: true
      loop:
        - prometheus
        - promtool
        
    - name: Install Prometheus console files
      copy:
        src: "/tmp/prometheus-{{ prometheus_version | default('2.47.0') }}.linux-amd64/{{ item }}"
        dest: "/opt/ai-dev/monitoring/prometheus/{{ item }}"
        mode: '0644'
        remote_src: true
        owner: monitoring
        group: monitoring
      loop:
        - consoles
        - console_libraries
        
- name: Download and install Node Exporter
  block:
    - name: Download Node Exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version | default('1.6.1') }}/node_exporter-{{ node_exporter_version | default('1.6.1') }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version | default('1.6.1') }}.linux-amd64.tar.gz"
        mode: '0644'
        
    - name: Extract Node Exporter
      unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version | default('1.6.1') }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: true
        
    - name: Install Node Exporter binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version | default('1.6.1') }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: true
        
- name: Download and install Alertmanager
  block:
    - name: Download Alertmanager
      get_url:
        url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version | default('0.26.0') }}/alertmanager-{{ alertmanager_version | default('0.26.0') }}.linux-amd64.tar.gz"
        dest: "/tmp/alertmanager-{{ alertmanager_version | default('0.26.0') }}.linux-amd64.tar.gz"
        mode: '0644'
        
    - name: Extract Alertmanager
      unarchive:
        src: "/tmp/alertmanager-{{ alertmanager_version | default('0.26.0') }}.linux-amd64.tar.gz"
        dest: /tmp
        remote_src: true
        
    - name: Install Alertmanager binaries
      copy:
        src: "/tmp/alertmanager-{{ alertmanager_version | default('0.26.0') }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        remote_src: true
      loop:
        - alertmanager
        - amtool
        
- name: Set ownership of monitoring directories
  file:
    path: /opt/ai-dev/monitoring
    state: directory
    recurse: true
    owner: monitoring
    group: monitoring
    
- name: Create Prometheus configuration
  copy:
    content: |
      # Prometheus configuration
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      
      global:
        scrape_interval: {{ prometheus_scrape_interval | default('15s') }}
        evaluation_interval: {{ prometheus_evaluation_interval | default('15s') }}
        external_labels:
          cluster: 'ai-dev'
          environment: '{{ environment | default('development') }}'
          
      rule_files:
        - "/opt/ai-dev/monitoring/rules/*.yml"
        
      alerting:
        alertmanagers:
          - static_configs:
              - targets:
                  - localhost:9093
                  
      scrape_configs:
        # Prometheus itself
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']
          scrape_interval: 5s
          
        # Node Exporter
        - job_name: 'node-exporter'
          static_configs:
            - targets: ['localhost:9100']
          scrape_interval: 10s
          
        # Ray Head Node
        - job_name: 'ray-head'
          static_configs:
            - targets: ['{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_metrics_port | default(8080) }}']
          scrape_interval: 10s
          metrics_path: '/metrics'
          
        # Ray Dashboard
        - job_name: 'ray-dashboard'
          static_configs:
            - targets: ['{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_dashboard_port | default(8265) }}']
          scrape_interval: 30s
          metrics_path: '/api/cluster_status'
          
        # Docker containers
        - job_name: 'docker'
          static_configs:
            - targets: ['localhost:9323']
          scrape_interval: 15s
          
        # Jupyter
        - job_name: 'jupyter'
          static_configs:
            - targets: ['localhost:{{ jupyter_port | default(8888) }}']
          scrape_interval: 30s
          metrics_path: '/api/metrics'
          
        # GPU metrics (if available)
        - job_name: 'gpu-exporter'
          static_configs:
            - targets: ['localhost:9445']
          scrape_interval: 10s
          
        # Custom AI/ML metrics
        - job_name: 'ai-metrics'
          static_configs:
            - targets: ['localhost:8000']
          scrape_interval: 15s
          metrics_path: '/metrics'
          
        # Health checks
        - job_name: 'health-checks'
          static_configs:
            - targets: ['localhost:8080']
          scrape_interval: 30s
          metrics_path: '/health'
          
      # Remote write configuration (optional)
      {% if prometheus_remote_write_url is defined %}
      remote_write:
        - url: {{ prometheus_remote_write_url }}
          {% if prometheus_remote_write_username is defined %}
          basic_auth:
            username: {{ prometheus_remote_write_username }}
            password: {{ prometheus_remote_write_password }}
          {% endif %}
      {% endif %}
      
      # Storage configuration
      storage:
        tsdb:
          retention.time: {{ prometheus_retention_time | default('30d') }}
          retention.size: {{ prometheus_retention_size | default('10GB') }}
          path: /opt/ai-dev/monitoring/data/prometheus
    dest: /opt/ai-dev/monitoring/config/prometheus.yml
    mode: '0644'
    owner: monitoring
    group: monitoring
    
- name: Create Alertmanager configuration
  copy:
    content: |
      # Alertmanager configuration
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      
      global:
        smtp_smarthost: '{{ alertmanager_smtp_host | default('localhost:587') }}'
        smtp_from: '{{ alertmanager_from_email | default('alerts@ai-dev.local') }}'
        
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 1h
        receiver: 'default'
        routes:
          - match:
              severity: critical
            receiver: 'critical-alerts'
          - match:
              severity: warning
            receiver: 'warning-alerts'
            
      receivers:
        - name: 'default'
          {% if alertmanager_webhook_url is defined %}
          webhook_configs:
            - url: '{{ alertmanager_webhook_url }}'
              send_resolved: true
          {% endif %}
          
        - name: 'critical-alerts'
          {% if alertmanager_email_to is defined %}
          email_configs:
            - to: '{{ alertmanager_email_to }}'
              subject: '[CRITICAL] AI-Dev Alert: {{ "{{" }} .GroupLabels.alertname {{ "}}" }}'
              body: |
                Alert: {{ "{{" }} .GroupLabels.alertname {{ "}}" }}
                Severity: {{ "{{" }} .CommonLabels.severity {{ "}}" }}
                Instance: {{ "{{" }} .CommonLabels.instance {{ "}}" }}
                Description: {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
                
                Time: {{ "{{" }} .CommonAnnotations.timestamp {{ "}}" }}
          {% endif %}
          {% if alertmanager_webhook_url is defined %}
          webhook_configs:
            - url: '{{ alertmanager_webhook_url }}'
              send_resolved: true
          {% endif %}
          
        - name: 'warning-alerts'
          {% if alertmanager_email_to is defined %}
          email_configs:
            - to: '{{ alertmanager_email_to }}'
              subject: '[WARNING] AI-Dev Alert: {{ "{{" }} .GroupLabels.alertname {{ "}}" }}'
              body: |
                Alert: {{ "{{" }} .GroupLabels.alertname {{ "}}" }}
                Severity: {{ "{{" }} .CommonLabels.severity {{ "}}" }}
                Instance: {{ "{{" }} .CommonLabels.instance {{ "}}" }}
                Description: {{ "{{" }} .CommonAnnotations.description {{ "}}" }}
                
                Time: {{ "{{" }} .CommonAnnotations.timestamp {{ "}}" }}
          {% endif %}
          
      inhibit_rules:
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'cluster', 'service']
    dest: /opt/ai-dev/monitoring/config/alertmanager.yml
    mode: '0644'
    owner: monitoring
    group: monitoring
    
- name: Create Prometheus alert rules
  copy:
    content: |
      # Prometheus alert rules for AI development infrastructure
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      
      groups:
        - name: system-alerts
          rules:
            - alert: HighCPUUsage
              expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High CPU usage detected"
                description: "CPU usage is above 80% for more than 5 minutes on {{ "{{" }} $labels.instance {{ "}}" }}"
                
            - alert: HighMemoryUsage
              expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High memory usage detected"
                description: "Memory usage is above 85% for more than 5 minutes on {{ "{{" }} $labels.instance {{ "}}" }}"
                
            - alert: LowDiskSpace
              expr: (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 < 10
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Low disk space detected"
                description: "Disk space is below 10% on {{ "{{" }} $labels.instance {{ "}}" }} ({{ "{{" }} $labels.mountpoint {{ "}}" }})"
                
        - name: ray-alerts
          rules:
            - alert: RayHeadDown
              expr: up{job="ray-head"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Ray head node is down"
                description: "Ray head node has been down for more than 2 minutes"
                
            - alert: RayHighMemoryUsage
              expr: ray_object_store_memory_used / ray_object_store_memory_total * 100 > 90
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Ray object store memory usage is high"
                description: "Ray object store memory usage is above 90% for more than 5 minutes"
                
            - alert: RayWorkerDown
              expr: ray_cluster_num_workers < 1
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "No Ray workers available"
                description: "Ray cluster has no workers available for more than 5 minutes"
                
        - name: docker-alerts
          rules:
            - alert: DockerDown
              expr: up{job="docker"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Docker daemon is down"
                description: "Docker daemon has been down for more than 2 minutes"
                
            - alert: HighContainerCPU
              expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High container CPU usage"
                description: "Container {{ "{{" }} $labels.name {{ "}}" }} CPU usage is above 80% for more than 5 minutes"
                
        - name: service-alerts
          rules:
            - alert: ServiceDown
              expr: up == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Service is down"
                description: "Service {{ "{{" }} $labels.job {{ "}}" }} on {{ "{{" }} $labels.instance {{ "}}" }} has been down for more than 2 minutes"
                
            - alert: HighResponseTime
              expr: http_request_duration_seconds{quantile="0.95"} > 2
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "High response time detected"
                description: "95th percentile response time is above 2 seconds for {{ "{{" }} $labels.job {{ "}}" }}"
    dest: /opt/ai-dev/monitoring/rules/alerts.yml
    mode: '0644'
    owner: monitoring
    group: monitoring
    
- name: Create systemd service for Prometheus
  copy:
    content: |
      [Unit]
      Description=Prometheus Server
      Documentation=https://prometheus.io/docs/
      After=network.target
      
      [Service]
      Type=simple
      User=monitoring
      Group=monitoring
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/opt/ai-dev/monitoring/config/prometheus.yml \
        --storage.tsdb.path=/opt/ai-dev/monitoring/data/prometheus \
        --web.console.templates=/opt/ai-dev/monitoring/prometheus/consoles \
        --web.console.libraries=/opt/ai-dev/monitoring/prometheus/console_libraries \
        --web.listen-address=0.0.0.0:{{ prometheus_port | default(9090) }} \
        --web.external-url=http://{{ ansible_default_ipv4.address }}:{{ prometheus_port | default(9090) }}/ \
        --storage.tsdb.retention.time={{ prometheus_retention_time | default('30d') }} \
        --storage.tsdb.retention.size={{ prometheus_retention_size | default('10GB') }} \
        --web.enable-lifecycle \
        --web.enable-admin-api
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=always
      RestartSec=5
      TimeoutStopSec=20
      SendSIGKILL=no
      
      # Resource limits
      LimitNOFILE=65536
      LimitNPROC=32768
      
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service
    
- name: Create systemd service for Node Exporter
  copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      Documentation=https://prometheus.io/docs/guides/node-exporter/
      After=network.target
      
      [Service]
      Type=simple
      User=monitoring
      Group=monitoring
      ExecStart=/usr/local/bin/node_exporter \
        --web.listen-address=0.0.0.0:{{ node_exporter_port | default(9100) }} \
        --path.procfs=/proc \
        --path.sysfs=/sys \
        --collector.filesystem.ignored-mount-points="^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)" \
        --collector.filesystem.ignored-fs-types="^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$" \
        --collector.netdev.ignored-devices="^(veth.*|docker.*|br-.*|lo)$$" \
        --collector.textfile.directory=/opt/ai-dev/monitoring/node-exporter
      Restart=always
      RestartSec=5
      
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node-exporter.service
    
- name: Create systemd service for Alertmanager
  copy:
    content: |
      [Unit]
      Description=Prometheus Alertmanager
      Documentation=https://prometheus.io/docs/alerting/alertmanager/
      After=network.target
      
      [Service]
      Type=simple
      User=monitoring
      Group=monitoring
      ExecStart=/usr/local/bin/alertmanager \
        --config.file=/opt/ai-dev/monitoring/config/alertmanager.yml \
        --storage.path=/opt/ai-dev/monitoring/data/alertmanager \
        --web.listen-address=0.0.0.0:{{ alertmanager_port | default(9093) }} \
        --web.external-url=http://{{ ansible_default_ipv4.address }}:{{ alertmanager_port | default(9093) }}/ \
        --cluster.listen-address=0.0.0.0:{{ alertmanager_cluster_port | default(9094) }}
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=always
      RestartSec=5
      
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/alertmanager.service
    
- name: Create monitoring utility script
  copy:
    content: |
      #!/bin/bash
      # AI-Dev Monitoring Utility Script
      
      set -e
      
      PROMETHEUS_URL="http://{{ ansible_default_ipv4.address }}:{{ prometheus_port | default(9090) }}"
      GRAFANA_URL="http://{{ ansible_default_ipv4.address }}:{{ grafana_port | default(3000) }}"
      ALERTMANAGER_URL="http://{{ ansible_default_ipv4.address }}:{{ alertmanager_port | default(9093) }}"
      
      # Function to check service status
      check_services() {
          echo "=== Monitoring Services Status ==="
          
          services=("prometheus" "node-exporter" "alertmanager" "grafana")
          
          for service in "${services[@]}"; do
              if systemctl is-active --quiet "$service"; then
                  echo "✓ $service: Running"
              else
                  echo "✗ $service: Stopped"
              fi
          done
          
          echo ""
      }
      
      # Function to show service URLs
      show_urls() {
          echo "=== Monitoring URLs ==="
          echo "Prometheus: $PROMETHEUS_URL"
          echo "Grafana: $GRAFANA_URL"
          echo "Alertmanager: $ALERTMANAGER_URL"
          echo "Node Exporter: http://{{ ansible_default_ipv4.address }}:{{ node_exporter_port | default(9100) }}"
          echo ""
      }
      
      # Function to restart all services
      restart_all() {
          echo "Restarting all monitoring services..."
          
          services=("prometheus" "node-exporter" "alertmanager" "grafana")
          
          for service in "${services[@]}"; do
              echo "Restarting $service..."
              systemctl restart "$service"
              sleep 2
          done
          
          echo "All services restarted!"
      }
      
      # Function to show metrics summary
      show_metrics() {
          echo "=== System Metrics Summary ==="
          
          # CPU usage
          CPU_USAGE=$(top -bn1 | grep "Cpu(s)" | awk '{print $2}' | cut -d'%' -f1)
          echo "CPU Usage: ${CPU_USAGE}%"
          
          # Memory usage
          MEMORY_INFO=$(free -h | grep "Mem:")
          echo "Memory: $MEMORY_INFO"
          
          # Disk usage
          echo "Disk Usage:"
          df -h | grep -E '^/dev/' | head -5
          
          # Ray cluster status (if available)
          if command -v ray &> /dev/null; then
              echo ""
              echo "=== Ray Cluster Status ==="
              ray status --address="ray://{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_head_port | default(10001) }}" 2>/dev/null || echo "Ray cluster not available"
          fi
          
          echo ""
      }
      
      # Function to test connectivity
      test_connectivity() {
          echo "=== Testing Monitoring Connectivity ==="
          
          # Test Prometheus
          if curl -s "$PROMETHEUS_URL/api/v1/query?query=up" > /dev/null; then
              echo "✓ Prometheus API: Accessible"
          else
              echo "✗ Prometheus API: Not accessible"
          fi
          
          # Test Grafana
          if curl -s "$GRAFANA_URL/api/health" > /dev/null; then
              echo "✓ Grafana API: Accessible"
          else
              echo "✗ Grafana API: Not accessible"
          fi
          
          # Test Alertmanager
          if curl -s "$ALERTMANAGER_URL/api/v1/status" > /dev/null; then
              echo "✓ Alertmanager API: Accessible"
          else
              echo "✗ Alertmanager API: Not accessible"
          fi
          
          echo ""
      }
      
      # Function to show logs
      show_logs() {
          local service="$1"
          
          if [ -z "$service" ]; then
              echo "Available services: prometheus, node-exporter, alertmanager, grafana"
              return 1
          fi
          
          echo "=== $service Logs (last 50 lines) ==="
          journalctl -u "$service" -n 50 --no-pager
      }
      
      # Function to backup monitoring configuration
      backup_config() {
          BACKUP_DIR="/opt/ai-dev/backups/monitoring-$(date +%Y%m%d-%H%M%S)"
          
          echo "Creating monitoring backup in $BACKUP_DIR..."
          
          mkdir -p "$BACKUP_DIR"
          
          # Backup configurations
          cp -r /opt/ai-dev/monitoring/config "$BACKUP_DIR/"
          cp -r /opt/ai-dev/monitoring/rules "$BACKUP_DIR/"
          
          # Backup systemd services
          mkdir -p "$BACKUP_DIR/systemd"
          cp /etc/systemd/system/prometheus.service "$BACKUP_DIR/systemd/"
          cp /etc/systemd/system/node-exporter.service "$BACKUP_DIR/systemd/"
          cp /etc/systemd/system/alertmanager.service "$BACKUP_DIR/systemd/"
          
          echo "Backup completed: $BACKUP_DIR"
      }
      
      # Main command dispatcher
      case "$1" in
          status)
              check_services
              show_urls
              ;;
          metrics)
              show_metrics
              ;;
          test)
              test_connectivity
              ;;
          restart)
              restart_all
              ;;
          logs)
              show_logs "$2"
              ;;
          backup)
              backup_config
              ;;
          urls)
              show_urls
              ;;
          *)
              echo "AI-Dev Monitoring Utility"
              echo ""
              echo "Usage: $0 {status|metrics|test|restart|logs|backup|urls}"
              echo ""
              echo "Commands:"
              echo "  status   - Show service status and URLs"
              echo "  metrics  - Show system metrics summary"
              echo "  test     - Test monitoring connectivity"
              echo "  restart  - Restart all monitoring services"
              echo "  logs     - Show service logs (specify service name)"
              echo "  backup   - Backup monitoring configuration"
              echo "  urls     - Show monitoring URLs"
              echo ""
              echo "Examples:"
              echo "  $0 status"
              echo "  $0 logs prometheus"
              echo "  $0 test"
              exit 1
              ;;
      esac
    dest: /opt/ai-dev/scripts/monitoring.sh
    mode: '0755'
    
- name: Create monitoring utility symlink
  file:
    src: /opt/ai-dev/scripts/monitoring.sh
    dest: /usr/local/bin/ai-monitoring
    state: link
    
- name: Enable and start monitoring services
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - prometheus
    - node-exporter
    - alertmanager
    
- name: Wait for monitoring services to be ready
  wait_for:
    port: "{{ item.port }}"
    host: "{{ ansible_default_ipv4.address }}"
    timeout: 60
  loop:
    - { port: "{{ prometheus_port | default(9090) }}" }
    - { port: "{{ node_exporter_port | default(9100) }}" }
    - { port: "{{ alertmanager_port | default(9093) }}" }
    
- name: Test monitoring services
  uri:
    url: "{{ item.url }}"
    method: GET
    status_code: 200
  loop:
    - { url: "http://{{ ansible_default_ipv4.address }}:{{ prometheus_port | default(9090) }}/-/healthy" }
    - { url: "http://{{ ansible_default_ipv4.address }}:{{ node_exporter_port | default(9100) }}/metrics" }
    - { url: "http://{{ ansible_default_ipv4.address }}:{{ alertmanager_port | default(9093) }}/-/healthy" }
  register: monitoring_health_check
  
- name: Display monitoring setup information
  debug:
    msg: |
      Monitoring setup completed!
      
      Services:
      - Prometheus: http://{{ ansible_default_ipv4.address }}:{{ prometheus_port | default(9090) }}
      - Node Exporter: http://{{ ansible_default_ipv4.address }}:{{ node_exporter_port | default(9100) }}
      - Alertmanager: http://{{ ansible_default_ipv4.address }}:{{ alertmanager_port | default(9093) }}
      
      Configuration:
      - Config files: /opt/ai-dev/monitoring/config/
      - Alert rules: /opt/ai-dev/monitoring/rules/
      - Data directory: /opt/ai-dev/monitoring/data/
      
      Utility commands:
      - ai-monitoring status    # Show service status
      - ai-monitoring metrics   # Show system metrics
      - ai-monitoring test      # Test connectivity
      - ai-monitoring restart   # Restart all services
      
      Health Check: {{ 'PASSED' if monitoring_health_check is succeeded else 'FAILED' }}
      
- name: Create completion marker
  file:
    path: /opt/ai-dev/.monitoring_setup_complete
    state: touch
    mode: '0644'