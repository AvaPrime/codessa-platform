# Prometheus Configuration for AI Development Infrastructure
# Generated by Ansible - Comprehensive monitoring setup

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'ai-dev'
    environment: 'development'
    region: 'local'

# Rule files for alerting
rule_files:
  - "rules/*.yml"
  - "rules/alerts/*.yml"
  - "rules/recording/*.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
            - localhost:9093
      timeout: 10s
      api_version: v2

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090', 'prometheus:9090']
    scrape_interval: 5s
    metrics_path: /metrics
    honor_labels: true
    
  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100', 'node-exporter:9100']
    scrape_interval: 10s
    metrics_path: /metrics
    
  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080', 'cadvisor:8080']
    scrape_interval: 15s
    metrics_path: /metrics
    
  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093', 'alertmanager:9093']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000', 'grafana:3000']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # Ray Head Node - Distributed computing metrics
  - job_name: 'ray-head'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 10s
    metrics_path: /metrics
    honor_labels: true
    
  # Ray Dashboard
  - job_name: 'ray-dashboard'
    static_configs:
      - targets: ['localhost:8265']
    scrape_interval: 30s
    metrics_path: /api/cluster_status
    
  # Ray Exporter (custom)
  - job_name: 'ray-exporter'
    static_configs:
      - targets: ['localhost:9646', 'ray-exporter:9646']
    scrape_interval: 15s
    metrics_path: /metrics
    
  # Docker Engine metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
    scrape_interval: 15s
    metrics_path: /metrics
    
  # NVIDIA GPU metrics (if available)
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['localhost:9445', 'nvidia-exporter:9445']
    scrape_interval: 10s
    metrics_path: /metrics
    honor_labels: true
    
  # Jupyter Notebook/Lab
  - job_name: 'jupyter'
    static_configs:
      - targets: ['localhost:8888']
    scrape_interval: 30s
    metrics_path: /api/metrics
    
  # MLflow (if running)
  - job_name: 'mlflow'
    static_configs:
      - targets: ['localhost:5000']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # TensorBoard (if running)
  - job_name: 'tensorboard'
    static_configs:
      - targets: ['localhost:6006']
    scrape_interval: 30s
    metrics_path: /data/plugin/scalars/scalars
    
  # Custom AI/ML application metrics
  - job_name: 'ai-applications'
    static_configs:
      - targets: ['localhost:8000']
    scrape_interval: 15s
    metrics_path: /metrics
    honor_labels: true
    
  # Health check endpoints
  - job_name: 'health-checks'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 30s
    metrics_path: /health
    
  # Tailscale metrics (if available)
  - job_name: 'tailscale'
    static_configs:
      - targets: ['localhost:41641']
    scrape_interval: 60s
    metrics_path: /debug/metrics
    
  # Redis (if running)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # PostgreSQL (if running)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # MongoDB (if running)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:9216']
    scrape_interval: 30s
    metrics_path: /metrics
    
  # Blackbox exporter for endpoint monitoring
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://localhost:8888  # Jupyter
          - http://localhost:8265  # Ray Dashboard
          - http://localhost:3000  # Grafana
          - http://localhost:5000  # MLflow
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115
        
  # File-based service discovery for dynamic targets
  - job_name: 'file-discovery'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/*.json'
          - '/etc/prometheus/targets/*.yml'
        refresh_interval: 30s
    
  # Kubernetes pods (if running in k8s)
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

# Remote write configuration (for long-term storage)
# Uncomment and configure if using remote storage
# remote_write:
#   - url: "https://prometheus-remote-write-endpoint/api/v1/write"
#     basic_auth:
#       username: "username"
#       password: "password"
#     queue_config:
#       max_samples_per_send: 1000
#       max_shards: 200
#       capacity: 2500

# Remote read configuration
# remote_read:
#   - url: "https://prometheus-remote-read-endpoint/api/v1/read"
#     basic_auth:
#       username: "username"
#       password: "password"

# Storage configuration
storage:
  tsdb:
    path: /prometheus
    retention.time: 30d
    retention.size: 10GB
    wal-compression: true
    
