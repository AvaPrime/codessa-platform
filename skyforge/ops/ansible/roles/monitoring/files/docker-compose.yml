# Docker Compose for AI-Dev Monitoring Stack
# Generated by Ansible - Grafana, Prometheus, and related services

version: '3.8'

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.2.0}
    container_name: ai-dev-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ai-dev-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_USERS_AUTO_ASSIGN_ORG=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://${GRAFANA_HOST:-localhost}:${GRAFANA_PORT:-3000}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel,natel-discrete-panel,vonage-status-panel
      - GF_FEATURE_TOGGLES_ENABLE=ngalert
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - GF_LOG_LEVEL=${GRAFANA_LOG_LEVEL:-info}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    networks:
      - monitoring
      - ai-dev
    labels:
      - "ai-dev.service=grafana"
      - "ai-dev.component=monitoring"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.47.0}
    container_name: ai-dev-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.external-url=http://${PROMETHEUS_HOST:-localhost}:${PROMETHEUS_PORT:-9090}/'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
      - ai-dev
    labels:
      - "ai-dev.service=prometheus"
      - "ai-dev.component=monitoring"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.6.1}
    container_name: ai-dev-node-exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$'
      - '--collector.netdev.device-exclude=^(veth.*|docker.*|br-.*)$$'
      - '--collector.textfile.directory=/host/textfile'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /opt/ai-dev/monitoring/textfile:/host/textfile:ro
    networks:
      - monitoring
    labels:
      - "ai-dev.service=node-exporter"
      - "ai-dev.component=monitoring"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION:-v0.26.0}
    container_name: ai-dev-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://${ALERTMANAGER_HOST:-localhost}:${ALERTMANAGER_PORT:-9093}/'
      - '--cluster.listen-address=0.0.0.0:9094'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring
      - ai-dev
    labels:
      - "ai-dev.service=alertmanager"
      - "ai-dev.component=monitoring"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.47.2}
    container_name: ai-dev-cadvisor
    restart: unless-stopped
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring
    labels:
      - "ai-dev.service=cadvisor"
      - "ai-dev.component=monitoring"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # GPU monitoring (optional, only if NVIDIA GPU is available)
  nvidia-exporter:
    image: mindprince/nvidia_gpu_prometheus_exporter:${NVIDIA_EXPORTER_VERSION:-0.1.0}
    container_name: ai-dev-nvidia-exporter
    restart: unless-stopped
    ports:
      - "${NVIDIA_EXPORTER_PORT:-9445}:9445"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - monitoring
    labels:
      - "ai-dev.service=nvidia-exporter"
      - "ai-dev.component=monitoring"
    profiles:
      - gpu
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9445/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ray metrics exporter
  ray-exporter:
    image: python:3.11-slim
    container_name: ai-dev-ray-exporter
    restart: unless-stopped
    ports:
      - "${RAY_EXPORTER_PORT:-9646}:9646"
    environment:
      - RAY_ADDRESS=${RAY_ADDRESS:-ray://localhost:10001}
      - EXPORTER_PORT=9646
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ray-exporter:/app
    working_dir: /app
    command: python ray_exporter.py
    networks:
      - monitoring
      - ai-dev
    labels:
      - "ai-dev.service=ray-exporter"
      - "ai-dev.component=monitoring"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; requests.get(\"http://localhost:9646/metrics\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki for log aggregation (optional)
  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.0}
    container_name: ai-dev-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - monitoring
    labels:
      - "ai-dev.service=loki"
      - "ai-dev.component=monitoring"
    profiles:
      - logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Promtail for log collection (optional)
  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-2.9.0}
    container_name: ai-dev-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /opt/ai-dev/logs:/opt/ai-dev/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    labels:
      - "ai-dev.service=promtail"
      - "ai-dev.component=monitoring"
    profiles:
      - logs
    depends_on:
      - loki

networks:
  monitoring:
    driver: bridge
    name: ai-dev-monitoring
    labels:
      - "ai-dev.network=monitoring"
  ai-dev:
    external: true
    name: ai-dev

volumes:
  grafana-data:
    name: ai-dev-grafana-data
    labels:
      - "ai-dev.volume=grafana-data"
  prometheus-data:
    name: ai-dev-prometheus-data
    labels:
      - "ai-dev.volume=prometheus-data"
  alertmanager-data:
    name: ai-dev-alertmanager-data
    labels:
      - "ai-dev.volume=alertmanager-data"
  loki-data:
    name: ai-dev-loki-data
    labels:
      - "ai-dev.volume=loki-data"

# Health check and management
x-healthcheck-config: &healthcheck-config
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# Common labels
x-common-labels: &common-labels
  - "ai-dev.stack=monitoring"
  - "ai-dev.managed-by=docker-compose"
  - "ai-dev.version=${STACK_VERSION:-1.0.0}"

# Resource limits (can be overridden with environment variables)
x-resource-limits: &resource-limits
  deploy:
    resources:
      limits:
        memory: ${MEMORY_LIMIT:-1G}
        cpus: '${CPU_LIMIT:-1.0}'
      reservations:
        memory: ${MEMORY_RESERVATION:-512M}
        cpus: '${CPU_RESERVATION:-0.5}'