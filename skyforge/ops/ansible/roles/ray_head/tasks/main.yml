---
# Ray Head role - Distributed computing head node setup
# This role installs and configures Ray head node for AI/ML workloads

- name: Install Python dependencies for Ray
  package:
    name:
      - python3
      - python3-pip
      - python3-dev
      - python3-venv
      - build-essential
      - cmake
      - pkg-config
      - libssl-dev
      - libffi-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - libncurses5-dev
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libxml2-dev
      - libxmlsec1-dev
      - libffi-dev
      - liblzma-dev
    state: present
    
- name: Upgrade pip to latest version
  pip:
    name: pip
    state: latest
    executable: pip3
    
- name: Install Ray and related packages
  pip:
    name:
      - ray[default]=={{ ray_version | default('2.8.0') }}
      - ray[serve]
      - ray[tune]
      - ray[rllib]
      - ray[data]
      - ray[train]
      - numpy
      - pandas
      - scikit-learn
      - matplotlib
      - seaborn
      - jupyter
      - jupyterlab
      - notebook
      - ipywidgets
      - plotly
      - bokeh
      - streamlit
      - fastapi
      - uvicorn
      - pydantic
      - requests
      - aiohttp
      - psutil
      - GPUtil
      - tensorboard
      - wandb
      - mlflow
      - optuna
      - hyperopt
      - joblib
      - dask
      - distributed
      - redis
      - pymongo
      - sqlalchemy
      - alembic
    state: present
    executable: pip3
    extra_args: --upgrade
    
- name: Install AI/ML frameworks
  pip:
    name:
      - torch
      - torchvision
      - torchaudio
      - tensorflow
      - transformers
      - datasets
      - accelerate
      - diffusers
      - tokenizers
      - sentencepiece
      - opencv-python
      - pillow
      - imageio
      - scikit-image
      - librosa
      - soundfile
      - nltk
      - spacy
      - gensim
      - textblob
    state: present
    executable: pip3
    extra_args: --upgrade
  when: install_ml_frameworks | default(true)
  
- name: Create Ray directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
  loop:
    - /opt/ai-dev/ray
    - /opt/ai-dev/ray/logs
    - /opt/ai-dev/ray/temp
    - /opt/ai-dev/ray/config
    - /opt/ai-dev/ray/scripts
    - /opt/ai-dev/ray/data
    - /opt/ai-dev/ray/models
    - /opt/ai-dev/ray/checkpoints
    - /home/{{ ai_dev_user | default('aidev') }}/ray_results
    
- name: Create Ray configuration file
  copy:
    content: |
      # Ray Head Node Configuration
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      
      import os
      import ray
      from ray import tune, serve
      from ray.train import ScalingConfig
      from ray.air import session
      
      # Ray cluster configuration
      RAY_CONFIG = {
          'num_cpus': {{ ray_head_cpus | default(ansible_processor_vcpus) }},
          'num_gpus': {{ ray_head_gpus | default(0) }},
          'memory': {{ ray_head_memory | default(ansible_memtotal_mb * 1024 * 1024 * 0.8) | int }},
          'object_store_memory': {{ ray_object_store_memory | default(ansible_memtotal_mb * 1024 * 1024 * 0.3) | int }},
          'dashboard_host': '0.0.0.0',
          'dashboard_port': {{ ray_dashboard_port | default(8265) }},
          'include_dashboard': True,
          'log_to_driver': True,
          'logging_level': '{{ ray_logging_level | default('INFO') }}',
          'local_mode': False,
          'ignore_reinit_error': True,
          'temp_dir': '/opt/ai-dev/ray/temp',
          'storage': '/opt/ai-dev/ray/data',
          '_system_config': {
              'automatic_object_spilling_enabled': True,
              'object_spilling_config': {
                  'type': 'filesystem',
                  'params': {
                      'directory_path': '/opt/ai-dev/ray/temp/spill'
                  }
              },
              'max_io_workers': {{ ray_max_io_workers | default(4) }},
              'object_store_full_delay_ms': 100,
              'raylet_heartbeat_period_ms': 1000,
              'num_heartbeats_timeout': 30,
          }
      }
      
      # Environment variables
      os.environ.update({
          'RAY_TMPDIR': '/opt/ai-dev/ray/temp',
          'RAY_LOGGING_LEVEL': '{{ ray_logging_level | default('INFO') }}',
          'RAY_OBJECT_STORE_ALLOW_SLOW_STORAGE': '1',
          'RAY_DISABLE_IMPORT_WARNING': '1',
          'PYTHONPATH': '/opt/ai-dev/ray:/opt/ai-dev:' + os.environ.get('PYTHONPATH', ''),
          'CUDA_VISIBLE_DEVICES': '{{ cuda_visible_devices | default('all') }}',
          'OMP_NUM_THREADS': '{{ omp_num_threads | default(ansible_processor_vcpus) }}',
          'MKL_NUM_THREADS': '{{ mkl_num_threads | default(ansible_processor_vcpus) }}',
      })
      
      # Utility functions
      def start_ray_head():
          """Start Ray head node with configuration"""
          try:
              ray.shutdown()
          except:
              pass
              
          ray.init(**RAY_CONFIG)
          print(f"Ray head node started successfully!")
          print(f"Dashboard: http://0.0.0.0:{RAY_CONFIG['dashboard_port']}")
          print(f"Ray status: {ray.cluster_resources()}")
          return True
          
      def stop_ray_head():
          """Stop Ray head node"""
          ray.shutdown()
          print("Ray head node stopped")
          
      def get_cluster_info():
          """Get Ray cluster information"""
          if not ray.is_initialized():
              return "Ray is not initialized"
              
          return {
              'cluster_resources': ray.cluster_resources(),
              'available_resources': ray.available_resources(),
              'nodes': ray.nodes(),
              'timeline': ray.timeline(),
          }
          
      if __name__ == '__main__':
          start_ray_head()
    dest: /opt/ai-dev/ray/config/ray_config.py
    mode: '0644'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
    
- name: Create Ray head startup script
  copy:
    content: |
      #!/bin/bash
      # Ray Head Node Startup Script
      
      set -e
      
      # Configuration
      RAY_HEAD_IP="{{ ray_head_ip | default(ansible_default_ipv4.address) }}"
      RAY_HEAD_PORT="{{ ray_head_port | default(10001) }}"
      RAY_DASHBOARD_PORT="{{ ray_dashboard_port | default(8265) }}"
      RAY_TEMP_DIR="/opt/ai-dev/ray/temp"
      RAY_LOG_DIR="/opt/ai-dev/ray/logs"
      
      # Environment setup
      export RAY_TMPDIR="$RAY_TEMP_DIR"
      export RAY_LOGGING_LEVEL="{{ ray_logging_level | default('INFO') }}"
      export RAY_OBJECT_STORE_ALLOW_SLOW_STORAGE=1
      export RAY_DISABLE_IMPORT_WARNING=1
      export PYTHONPATH="/opt/ai-dev/ray:/opt/ai-dev:$PYTHONPATH"
      export CUDA_VISIBLE_DEVICES="{{ cuda_visible_devices | default('all') }}"
      export OMP_NUM_THREADS="{{ omp_num_threads | default(ansible_processor_vcpus) }}"
      export MKL_NUM_THREADS="{{ mkl_num_threads | default(ansible_processor_vcpus) }}"
      
      # Create necessary directories
      mkdir -p "$RAY_TEMP_DIR" "$RAY_LOG_DIR" "$RAY_TEMP_DIR/spill"
      chown -R {{ ai_dev_user | default('aidev') }}:{{ ai_dev_user | default('aidev') }} "$RAY_TEMP_DIR" "$RAY_LOG_DIR"
      
      # Function to start Ray head
      start_ray_head() {
          echo "Starting Ray head node..."
          
          # Kill any existing Ray processes
          pkill -f "ray::" || true
          sleep 2
          
          # Start Ray head node
          ray start \
              --head \
              --node-ip-address="$RAY_HEAD_IP" \
              --port="$RAY_HEAD_PORT" \
              --dashboard-host="0.0.0.0" \
              --dashboard-port="$RAY_DASHBOARD_PORT" \
              --num-cpus={{ ray_head_cpus | default(ansible_processor_vcpus) }} \
              --num-gpus={{ ray_head_gpus | default(0) }} \
              --memory={{ ray_head_memory | default(ansible_memtotal_mb * 1024 * 1024 * 0.8) | int }} \
              --object-store-memory={{ ray_object_store_memory | default(ansible_memtotal_mb * 1024 * 1024 * 0.3) | int }} \
              --temp-dir="$RAY_TEMP_DIR" \
              --log-style=pretty \
              --verbose \
              --disable-usage-stats
              
          if [ $? -eq 0 ]; then
              echo "Ray head node started successfully!"
              echo "Dashboard: http://$RAY_HEAD_IP:$RAY_DASHBOARD_PORT"
              echo "Connection: ray:///$RAY_HEAD_IP:$RAY_HEAD_PORT"
              
              # Wait a moment for services to start
              sleep 5
              
              # Display cluster status
              ray status
              
              return 0
          else
              echo "Failed to start Ray head node"
              return 1
          fi
      }
      
      # Function to stop Ray head
      stop_ray_head() {
          echo "Stopping Ray head node..."
          ray stop
          pkill -f "ray::" || true
          echo "Ray head node stopped"
      }
      
      # Function to restart Ray head
      restart_ray_head() {
          stop_ray_head
          sleep 3
          start_ray_head
      }
      
      # Function to show Ray status
      status_ray_head() {
          echo "=== Ray Head Node Status ==="
          if pgrep -f "ray::" > /dev/null; then
              echo "Ray processes are running"
              ray status
              echo ""
              echo "=== Dashboard ==="
              echo "URL: http://$RAY_HEAD_IP:$RAY_DASHBOARD_PORT"
              echo ""
              echo "=== Connection String ==="
              echo "ray:///$RAY_HEAD_IP:$RAY_HEAD_PORT"
          else
              echo "Ray head node is not running"
          fi
      }
      
      # Function to show Ray logs
      logs_ray_head() {
          echo "=== Ray Head Node Logs ==="
          if [ -d "$RAY_LOG_DIR" ]; then
              find "$RAY_LOG_DIR" -name "*.log" -type f -exec tail -n 20 {} +
          else
              echo "No log directory found: $RAY_LOG_DIR"
          fi
      }
      
      # Function to test Ray cluster
      test_ray_head() {
          echo "Testing Ray head node..."
          
          python3 << EOF
      import ray
      import time
      
      try:
          # Connect to Ray cluster
          ray.init(address='ray://$RAY_HEAD_IP:$RAY_HEAD_PORT')
          
          print(f"Connected to Ray cluster: {ray.cluster_resources()}")
          
          # Test remote function
          @ray.remote
          def test_function(x):
              return x * x
              
          # Execute test
          result = ray.get(test_function.remote(42))
          print(f"Test result: {result}")
          
          if result == 1764:
              print("Ray head node test: PASSED")
          else:
              print("Ray head node test: FAILED")
              
          ray.shutdown()
          
      except Exception as e:
          print(f"Ray head node test: FAILED - {e}")
      EOF
      }
      
      # Main command dispatcher
      case "$1" in
          start)
              start_ray_head
              ;;
          stop)
              stop_ray_head
              ;;
          restart)
              restart_ray_head
              ;;
          status)
              status_ray_head
              ;;
          logs)
              logs_ray_head
              ;;
          test)
              test_ray_head
              ;;
          *)
              echo "Usage: $0 {start|stop|restart|status|logs|test}"
              echo ""
              echo "Commands:"
              echo "  start   - Start Ray head node"
              echo "  stop    - Stop Ray head node"
              echo "  restart - Restart Ray head node"
              echo "  status  - Show Ray cluster status"
              echo "  logs    - Show Ray logs"
              echo "  test    - Test Ray cluster functionality"
              exit 1
              ;;
      esac
    dest: /opt/ai-dev/scripts/ray-head.sh
    mode: '0755'
    
- name: Create Ray head systemd service
  copy:
    content: |
      [Unit]
      Description=Ray Head Node
      After=network.target
      Wants=network.target
      
      [Service]
      Type=forking
      User={{ ai_dev_user | default('aidev') }}
      Group={{ ai_dev_user | default('aidev') }}
      Environment=HOME=/home/{{ ai_dev_user | default('aidev') }}
      Environment=USER={{ ai_dev_user | default('aidev') }}
      Environment=RAY_TMPDIR=/opt/ai-dev/ray/temp
      Environment=RAY_LOGGING_LEVEL={{ ray_logging_level | default('INFO') }}
      Environment=RAY_OBJECT_STORE_ALLOW_SLOW_STORAGE=1
      Environment=RAY_DISABLE_IMPORT_WARNING=1
      Environment=PYTHONPATH=/opt/ai-dev/ray:/opt/ai-dev
      Environment=CUDA_VISIBLE_DEVICES={{ cuda_visible_devices | default('all') }}
      Environment=OMP_NUM_THREADS={{ omp_num_threads | default(ansible_processor_vcpus) }}
      Environment=MKL_NUM_THREADS={{ mkl_num_threads | default(ansible_processor_vcpus) }}
      ExecStartPre=/bin/mkdir -p /opt/ai-dev/ray/temp /opt/ai-dev/ray/logs
      ExecStartPre=/bin/chown -R {{ ai_dev_user | default('aidev') }}:{{ ai_dev_user | default('aidev') }} /opt/ai-dev/ray
      ExecStart=/opt/ai-dev/scripts/ray-head.sh start
      ExecStop=/opt/ai-dev/scripts/ray-head.sh stop
      ExecReload=/opt/ai-dev/scripts/ray-head.sh restart
      Restart=always
      RestartSec=10
      TimeoutStartSec=60
      TimeoutStopSec=30
      KillMode=mixed
      KillSignal=SIGTERM
      
      # Resource limits
      LimitNOFILE=65536
      LimitNPROC=32768
      
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/ray-head.service
    
- name: Create Ray utility symlink
  file:
    src: /opt/ai-dev/scripts/ray-head.sh
    dest: /usr/local/bin/ai-ray
    state: link
    
- name: Create Ray monitoring script
  copy:
    content: |
      #!/bin/bash
      # Ray head node monitoring script
      
      LOG_FILE="/var/log/ai-dev/ray-monitor.log"
      TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
      RAY_HEAD_IP="{{ ray_head_ip | default(ansible_default_ipv4.address) }}"
      RAY_HEAD_PORT="{{ ray_head_port | default(10001) }}"
      
      # Check if Ray head is running
      if ! pgrep -f "ray::" > /dev/null; then
          echo "$TIMESTAMP - WARNING: Ray head node is not running" >> "$LOG_FILE"
          
          # Try to restart
          systemctl restart ray-head
          sleep 10
          
          if pgrep -f "ray::" > /dev/null; then
              echo "$TIMESTAMP - INFO: Ray head node restarted successfully" >> "$LOG_FILE"
          else
              echo "$TIMESTAMP - ERROR: Failed to restart Ray head node" >> "$LOG_FILE"
          fi
      else
          # Get cluster status
          CLUSTER_STATUS=$(ray status --address="ray://$RAY_HEAD_IP:$RAY_HEAD_PORT" 2>/dev/null || echo "Failed to get status")
          
          if [[ "$CLUSTER_STATUS" == *"Failed"* ]]; then
              echo "$TIMESTAMP - WARNING: Ray cluster status check failed" >> "$LOG_FILE"
          else
              # Extract resource information
              TOTAL_CPUS=$(echo "$CLUSTER_STATUS" | grep -o 'CPU: [0-9]*' | head -1 | grep -o '[0-9]*')
              TOTAL_MEMORY=$(echo "$CLUSTER_STATUS" | grep -o 'memory: [0-9.]*GiB' | head -1 | grep -o '[0-9.]*')
              
              echo "$TIMESTAMP - INFO: Ray cluster healthy - CPUs: $TOTAL_CPUS, Memory: ${TOTAL_MEMORY}GiB" >> "$LOG_FILE"
          fi
      fi
      
      # Check dashboard accessibility
      if curl -s "http://$RAY_HEAD_IP:{{ ray_dashboard_port | default(8265) }}/api/cluster_status" > /dev/null; then
          echo "$TIMESTAMP - INFO: Ray dashboard is accessible" >> "$LOG_FILE"
      else
          echo "$TIMESTAMP - WARNING: Ray dashboard is not accessible" >> "$LOG_FILE"
      fi
      
      # Check disk usage for Ray temp directory
      RAY_TEMP_USAGE=$(du -sh /opt/ai-dev/ray/temp 2>/dev/null | cut -f1 || echo "0")
      echo "$TIMESTAMP - INFO: Ray temp directory usage: $RAY_TEMP_USAGE" >> "$LOG_FILE"
      
      # Clean up old log files (keep last 7 days)
      find /opt/ai-dev/ray/logs -name "*.log" -type f -mtime +7 -delete 2>/dev/null || true
    dest: /opt/ai-dev/scripts/ray-monitor.sh
    mode: '0755'
    
- name: Create Ray monitoring cron job
  cron:
    name: "Ray head monitoring"
    minute: "*/2"
    job: "/opt/ai-dev/scripts/ray-monitor.sh"
    user: root
    
- name: Create Jupyter configuration for Ray
  copy:
    content: |
      # Jupyter configuration for Ray development
      c = get_config()
      
      # Basic configuration
      c.NotebookApp.ip = '0.0.0.0'
      c.NotebookApp.port = {{ jupyter_port | default(8888) }}
      c.NotebookApp.open_browser = False
      c.NotebookApp.allow_root = True
      c.NotebookApp.token = '{{ jupyter_token | default('ai-dev-token') }}'
      c.NotebookApp.password = ''
      
      # Security settings
      c.NotebookApp.allow_origin = '*'
      c.NotebookApp.allow_remote_access = True
      c.NotebookApp.disable_check_xsrf = True
      
      # Directory settings
      c.NotebookApp.notebook_dir = '/home/{{ ai_dev_user | default('aidev') }}/notebooks'
      
      # Ray-specific settings
      c.NotebookApp.kernel_spec_manager_class = 'jupyter_client.kernelspec.KernelSpecManager'
      
      # Enable extensions
      c.NotebookApp.nbserver_extensions = {
          'jupyter_nbextensions_configurator': True,
      }
      
      # Startup script to initialize Ray
      import os
      import sys
      
      # Add Ray paths
      sys.path.insert(0, '/opt/ai-dev/ray')
      sys.path.insert(0, '/opt/ai-dev')
      
      # Set environment variables
      os.environ['RAY_TMPDIR'] = '/opt/ai-dev/ray/temp'
      os.environ['RAY_LOGGING_LEVEL'] = '{{ ray_logging_level | default('INFO') }}'
      os.environ['CUDA_VISIBLE_DEVICES'] = '{{ cuda_visible_devices | default('all') }}'
    dest: /home/{{ ai_dev_user | default('aidev') }}/.jupyter/jupyter_notebook_config.py
    mode: '0644'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
    
- name: Create Jupyter startup directory
  file:
    path: /home/{{ ai_dev_user | default('aidev') }}/.ipython/profile_default/startup
    state: directory
    mode: '0755'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
    
- name: Create Ray initialization script for Jupyter
  copy:
    content: |
      # Ray initialization for Jupyter notebooks
      import os
      import sys
      import warnings
      warnings.filterwarnings('ignore')
      
      # Add paths
      sys.path.insert(0, '/opt/ai-dev/ray')
      sys.path.insert(0, '/opt/ai-dev')
      
      # Import Ray and common libraries
      try:
          import ray
          import numpy as np
          import pandas as pd
          import matplotlib.pyplot as plt
          import seaborn as sns
          
          # Set up plotting
          plt.style.use('default')
          sns.set_palette('husl')
          
          # Ray connection helper
          def connect_ray(address=None):
              """Connect to Ray cluster"""
              if address is None:
                  address = 'ray://{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_head_port | default(10001) }}'
              
              try:
                  ray.shutdown()
              except:
                  pass
                  
              ray.init(address=address)
              print(f"Connected to Ray cluster: {ray.cluster_resources()}")
              return True
              
          # Auto-connect to local Ray cluster
          if not ray.is_initialized():
              try:
                  connect_ray()
              except Exception as e:
                  print(f"Could not auto-connect to Ray: {e}")
                  print("Use connect_ray() to manually connect")
          
          print("Ray development environment loaded!")
          print("Available functions: connect_ray()")
          
      except ImportError as e:
          print(f"Could not import Ray libraries: {e}")
    dest: /home/{{ ai_dev_user | default('aidev') }}/.ipython/profile_default/startup/00-ray-init.py
    mode: '0644'
    owner: "{{ ai_dev_user | default('aidev') }}"
    group: "{{ ai_dev_user | default('aidev') }}"
    
- name: Enable and start Ray head service
  systemd:
    name: ray-head
    enabled: true
    state: started
    daemon_reload: true
    
- name: Wait for Ray head to be ready
  wait_for:
    port: "{{ ray_dashboard_port | default(8265) }}"
    host: "{{ ray_head_ip | default(ansible_default_ipv4.address) }}"
    timeout: 60
    
- name: Test Ray head installation
  command: /opt/ai-dev/scripts/ray-head.sh test
  register: ray_test_result
  changed_when: false
  
- name: Display Ray head setup information
  debug:
    msg: |
      Ray Head Node setup completed!
      
      Configuration:
      - Head IP: {{ ray_head_ip | default(ansible_default_ipv4.address) }}
      - Head Port: {{ ray_head_port | default(10001) }}
      - Dashboard: http://{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_dashboard_port | default(8265) }}
      - CPUs: {{ ray_head_cpus | default(ansible_processor_vcpus) }}
      - GPUs: {{ ray_head_gpus | default(0) }}
      - Memory: {{ (ray_head_memory | default(ansible_memtotal_mb * 1024 * 1024 * 0.8) | int / 1024 / 1024 / 1024) | round(1) }}GB
      
      Connection String:
      ray://{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ ray_head_port | default(10001) }}
      
      Utility commands:
      - ai-ray start     # Start Ray head
      - ai-ray status    # Show cluster status
      - ai-ray test      # Test cluster
      
      Jupyter:
      - URL: http://{{ ray_head_ip | default(ansible_default_ipv4.address) }}:{{ jupyter_port | default(8888) }}
      - Token: {{ jupyter_token | default('ai-dev-token') }}
      
      Test Result: {{ 'PASSED' if ray_test_result.rc == 0 else 'FAILED' }}
      
- name: Create completion marker
  file:
    path: /opt/ai-dev/.ray_head_setup_complete
    state: touch
    mode: '0644'