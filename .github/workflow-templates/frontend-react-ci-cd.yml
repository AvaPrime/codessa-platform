# Frontend React CI/CD Pipeline Template
# This template provides comprehensive CI/CD for React-based Codessa Platform frontends

name: Frontend React CI/CD

on:
  push:
    branches: [main, develop, 'feature/*', 'hotfix/*']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  NODE_VERSION: '18.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality and Testing
  quality:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        npm audit --audit-level=moderate
    
    - name: Code formatting check (Prettier)
      run: npm run format:check
    
    - name: Lint code (ESLint)
      run: npm run lint
    
    - name: Type checking (TypeScript)
      run: npm run type-check
      if: hashFiles('tsconfig.json') != ''
    
    - name: Run unit tests (Jest)
      run: npm run test:unit -- --coverage --watchAll=false
    
    - name: Run component tests (React Testing Library)
      run: npm run test:components -- --coverage --watchAll=false
    
    - name: Upload test coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-${{ matrix.node-version }}
    
    - name: Build application
      run: npm run build
      env:
        CI: true
        GENERATE_SOURCEMAP: false
    
    - name: Bundle size analysis
      run: |
        npm install -g bundlesize
        bundlesize
      continue-on-error: true

  # Visual Testing
  visual-testing:
    name: Visual Testing
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Storybook
      run: npm run build-storybook
      if: hashFiles('.storybook/main.js') != ''
    
    - name: Run Chromatic visual tests
      uses: chromaui/action@v1
      if: hashFiles('.storybook/main.js') != ''
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        buildScriptName: build-storybook
    
    - name: Run Playwright E2E tests
      run: |
        npx playwright install --with-deps
        npm run test:e2e
      env:
        CI: true
    
    - name: Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # Accessibility Testing
  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Run accessibility tests (axe-core)
      run: npm run test:a11y
    
    - name: Lighthouse CI
      run: |
        npm install -g @lhci/cli@0.12.x
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
    
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: ${{ github.event.repository.name }}
        path: '.'
        format: 'HTML'
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: reports/

  # Build and Package
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [quality, visual-testing, accessibility, security]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        CI: true
        GENERATE_SOURCEMAP: false
        REACT_APP_VERSION: ${{ github.sha }}
        REACT_APP_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
    
    - name: Optimize build
      run: |
        # Compress static assets
        find build/static -name '*.js' -exec gzip -k {} \;
        find build/static -name '*.css' -exec gzip -k {} \;
        
        # Generate service worker
        if [ -f "public/sw.js" ]; then
          cp public/sw.js build/
        fi
    
    - name: Create build artifact
      uses: actions/upload-artifact@v3
      with:
        name: build-files
        path: |
          build/
          package*.json
        retention-days: 7
    
    # Docker Build for containerized deployment
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_ENV=production
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifact
      uses: actions/download-artifact@v3
      with:
        name: build-files
        path: build/
    
    # Option 1: Static hosting (Netlify/Vercel)
    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v2.0
      if: env.NETLIFY_SITE_ID != ''
      with:
        publish-dir: './build'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    
    # Option 2: Kubernetes deployment
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      if: env.NETLIFY_SITE_ID == ''
      with:
        version: 'v1.28.0'
    
    - name: Deploy to Kubernetes
      if: env.NETLIFY_SITE_ID == ''
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
        # Update deployment with new image
        kubectl set image deployment/${{ github.event.repository.name }} \
          app=${{ needs.build.outputs.image-tag }} \
          --namespace=staging
        
        # Wait for rollout to complete
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=staging --timeout=300s
    
    - name: Run smoke tests
      run: |
        npm ci
        npm run test:smoke -- --env=staging
      env:
        STAGING_URL: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          ⚛️ ${{ github.event.repository.name }} (React) deployed to staging
          🔗 URL: https://staging-${{ github.event.repository.name }}.codessa.dev
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment:
      name: production
      url: https://${{ github.event.repository.name }}.codessa.dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifact
      uses: actions/download-artifact@v3
      with:
        name: build-files
        path: build/
    
    # Option 1: Static hosting (Netlify/Vercel)
    - name: Deploy to Netlify Production
      uses: nwtgck/actions-netlify@v2.0
      if: env.NETLIFY_SITE_ID != ''
      with:
        publish-dir: './build'
        production-deploy: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Production deploy from GitHub Actions"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    
    # Option 2: Kubernetes deployment
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      if: env.NETLIFY_SITE_ID == ''
      with:
        version: 'v1.28.0'
    
    - name: Pre-deployment checks
      if: env.NETLIFY_SITE_ID == ''
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
        # Check cluster health
        kubectl get nodes
        kubectl get pods --namespace=production
        
        # Verify staging deployment is healthy
        curl -f https://staging-${{ github.event.repository.name }}.codessa.dev
    
    - name: Deploy to Production
      if: env.NETLIFY_SITE_ID == ''
      run: |
        export KUBECONFIG=kubeconfig
        
        # Create backup of current deployment
        kubectl get deployment ${{ github.event.repository.name }} \
          --namespace=production -o yaml > backup-deployment.yaml
        
        # Update deployment with new image
        kubectl set image deployment/${{ github.event.repository.name }} \
          app=${{ needs.build.outputs.image-tag }} \
          --namespace=production
        
        # Wait for rollout to complete
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=production --timeout=600s
    
    - name: Post-deployment verification
      run: |
        # Health check
        curl -f https://${{ github.event.repository.name }}.codessa.dev
        
        # Run production smoke tests
        npm ci
        npm run test:production
      env:
        PRODUCTION_URL: https://${{ github.event.repository.name }}.codessa.dev
    
    - name: Rollback on failure
      if: failure() && env.NETLIFY_SITE_ID == ''
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout undo deployment/${{ github.event.repository.name }} \
          --namespace=production
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=production --timeout=300s
    
    - name: Notify production deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          🎉 ${{ github.event.repository.name }} (React) deployed to production!
          🔗 URL: https://${{ github.event.repository.name }}.codessa.dev
          📊 Status: ${{ job.status }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Lighthouse performance audit
      run: |
        npm install -g lighthouse
        lighthouse https://staging-${{ github.event.repository.name }}.codessa.dev \
          --output=html --output-path=lighthouse-report.html \
          --chrome-flags="--headless --no-sandbox"
    
    - name: Run WebPageTest
      uses: WebPageTest/github-action@v1
      with:
        apikey: ${{ secrets.WPT_API_KEY }}
        urls: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: |
          lighthouse-report.html
          webpagetest-results/

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: Clean up old images
      run: |
        echo "Cleaning up old container images..."
        # Container registry cleanup logic here
    
    - name: Clean up artifacts
      uses: geekyeggo/delete-artifact@v2
      with:
        name: |
          build-files
          playwright-report
          security-reports
        failOnError: false