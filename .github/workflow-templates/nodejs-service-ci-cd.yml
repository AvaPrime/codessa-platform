# Node.js Service CI/CD Pipeline Template
# This template provides comprehensive CI/CD for Codessa Platform services

name: Node.js Service CI/CD

on:
  push:
    branches: [main, develop, 'feature/*', 'hotfix/*']
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  NODE_VERSION: '18.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality and Testing
  quality:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        npm audit --audit-level=moderate
    
    - name: Code formatting check
      run: npm run format:check
      continue-on-error: false
    
    - name: Lint code
      run: npm run lint
    
    - name: Type checking
      run: npm run type-check
      if: hashFiles('tsconfig.json') != ''
    
    - name: Run unit tests
      run: npm run test:unit -- --coverage
    
    - name: Run integration tests
      run: npm run test:integration
      env:
        NODE_ENV: test
    
    - name: Upload test coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-${{ matrix.node-version }}
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      if: matrix.node-version == '18.x'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
    
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: ${{ github.event.repository.name }}
        path: '.'
        format: 'HTML'
    
    - name: Upload OWASP report
      uses: actions/upload-artifact@v3
      with:
        name: owasp-report
        path: reports/

  # Build and Package
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [quality, security]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --only=production
    
    - name: Build application
      run: npm run build
    
    - name: Create build artifact
      uses: actions/upload-artifact@v3
      with:
        name: build-files
        path: |
          dist/
          node_modules/
          package*.json
        retention-days: 7
    
    # Docker Build
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_ENV=production
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to Kubernetes
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update deployment with new image
        kubectl set image deployment/${{ github.event.repository.name }} \
          app=${{ needs.build.outputs.image-tag }} \
          --namespace=staging
        
        # Wait for rollout to complete
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=staging --timeout=300s
    
    - name: Run smoke tests
      run: |
        npm ci
        npm run test:smoke -- --env=staging
      env:
        STAGING_URL: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          🚀 ${{ github.event.repository.name }} deployed to staging
          📦 Image: ${{ needs.build.outputs.image-tag }}
          🔗 URL: https://staging-${{ github.event.repository.name }}.codessa.dev
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment:
      name: production
      url: https://${{ github.event.repository.name }}.codessa.dev
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Pre-deployment checks
      run: |
        export KUBECONFIG=kubeconfig
        
        # Check cluster health
        kubectl get nodes
        kubectl get pods --namespace=production
        
        # Verify staging deployment is healthy
        curl -f https://staging-${{ github.event.repository.name }}.codessa.dev/health
    
    - name: Deploy to Production
      run: |
        export KUBECONFIG=kubeconfig
        
        # Create backup of current deployment
        kubectl get deployment ${{ github.event.repository.name }} \
          --namespace=production -o yaml > backup-deployment.yaml
        
        # Update deployment with new image
        kubectl set image deployment/${{ github.event.repository.name }} \
          app=${{ needs.build.outputs.image-tag }} \
          --namespace=production
        
        # Wait for rollout to complete
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=production --timeout=600s
    
    - name: Post-deployment verification
      run: |
        # Health check
        curl -f https://${{ github.event.repository.name }}.codessa.dev/health
        
        # Run production smoke tests
        npm ci
        npm run test:production
      env:
        PRODUCTION_URL: https://${{ github.event.repository.name }}.codessa.dev
    
    - name: Rollback on failure
      if: failure()
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout undo deployment/${{ github.event.repository.name }} \
          --namespace=production
        kubectl rollout status deployment/${{ github.event.repository.name }} \
          --namespace=production --timeout=300s
    
    - name: Update deployment status
      uses: deployments@v1
      with:
        step: finish
        token: ${{ secrets.GITHUB_TOKEN }}
        status: ${{ job.status }}
        deployment-id: ${{ steps.deployment.outputs.deployment-id }}
    
    - name: Notify production deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          🎉 ${{ github.event.repository.name }} deployed to production!
          📦 Image: ${{ needs.build.outputs.image-tag }}
          🔗 URL: https://${{ github.event.repository.name }}.codessa.dev
          📊 Status: ${{ job.status }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run load tests
      run: npm run test:load
      env:
        TARGET_URL: https://staging-${{ github.event.repository.name }}.codessa.dev
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-results/

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: Clean up old images
      run: |
        # Keep only the last 10 images
        echo "Cleaning up old container images..."
        # This would typically involve calling container registry APIs
    
    - name: Clean up artifacts
      uses: geekyeggo/delete-artifact@v2
      with:
        name: |
          build-files
          owasp-report
        failOnError: false